<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アバター｜さんすうクエスト</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fff0f7;
  --surface: #ffffff;
  --surface2: #fce4f0;
  --surface3: #f8d0e8;
  --border: rgba(0,0,0,0.08);
  --border2: rgba(233,100,157,0.25);
  --pink: #e9649d;
  --pink2: #f4a0c8;
  --purple: #b07ae8;
  --mint: #2db87a;
  --gold: #f5a623;
  --blue: #4f8ef7;
  --text: #2d1a3e;
  --text2: #7a5a8a;
  --text3: #b89ac8;
  --radius: 20px;
  --radius-md: 14px;
  --radius-sm: 10px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Nunito', 'M PLUS Rounded 1c', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  color: var(--text);
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse at 10% 10%, rgba(233,100,157,0.12) 0%, transparent 50%),
    radial-gradient(ellipse at 90% 90%, rgba(176,122,232,0.10) 0%, transparent 50%);
  pointer-events: none;
}

.back-bar { padding: 12px 16px; max-width: 720px; margin: 0 auto; position: relative; z-index: 1; }
.back-btn {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: inherit; font-size: 14px; font-weight: 800;
  padding: 8px 16px; border-radius: 20px;
  border: 2px solid var(--border2);
  background: white; color: var(--text2);
  cursor: pointer; text-decoration: none; transition: .15s;
}
.back-btn:hover { background: var(--surface2); color: var(--pink); }

/* コインバー */
.coin-bar {
  max-width: 720px; margin: 0 auto 0;
  padding: 0 16px 12px;
  display: flex; align-items: center; gap: 10px;
  position: relative; z-index: 1;
}
.coin-display {
  display: flex; align-items: center; gap: 6px;
  background: white; border: 2px solid rgba(245,166,35,0.3);
  border-radius: 20px; padding: 6px 16px;
  font-weight: 900; font-size: 15px; color: var(--gold);
}
.coin-display .coin-icon { font-size: 18px; }

.app { max-width: 720px; margin: 0 auto; padding: 0 16px 40px; position: relative; z-index: 1; }

/* メインレイアウト */
.main-layout {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 16px;
}
@media (max-width: 500px) {
  .main-layout { grid-template-columns: 1fr; }
}

/* アバタープレビュー */
.avatar-panel {
  background: white;
  border-radius: var(--radius);
  border: 2px solid var(--border2);
  padding: 20px;
  display: flex; flex-direction: column; align-items: center; gap: 12px;
  box-shadow: 0 4px 20px rgba(233,100,157,0.10);
}
.avatar-panel h2 {
  font-size: 14px; font-weight: 900; color: var(--text2);
  letter-spacing: .05em;
}
.avatar-stage {
  width: 300px; height: 500px;
  background: linear-gradient(160deg, #fce4f0 0%, #ede0ff 100%);
  border-radius: 16px; border: 2px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
.avatar-stage::before {
  content: '';
  position: absolute; bottom: 0; left: 0; right: 0; height: 40px;
  background: linear-gradient(0deg, rgba(233,100,157,0.15), transparent);
}
#avatar-svg { width: 140px; height: 180px; }

.avatar-name-display {
  font-size: 14px; font-weight: 900; color: var(--pink);
}

/* カテゴリタブ */
.shop-panel {
  background: white;
  border-radius: var(--radius);
  border: 2px solid var(--border2);
  padding: 16px;
  box-shadow: 0 4px 20px rgba(233,100,157,0.10);
  overflow: hidden;
}
.shop-panel h2 {
  font-size: 14px; font-weight: 900; color: var(--text2);
  letter-spacing: .05em; margin-bottom: 12px;
}

.cat-tabs {
  display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap;
}
.cat-tab {
  font-family: inherit; font-size: 12px; font-weight: 800;
  padding: 5px 12px; border-radius: 20px;
  border: 1.5px solid var(--border2);
  background: var(--surface2); color: var(--text2);
  cursor: pointer; transition: .15s;
}
.cat-tab.active {
  background: var(--pink); color: white; border-color: var(--pink);
}
.cat-tab:hover:not(.active) { background: var(--surface3); }

/* パーツグリッド */
.parts-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 8px; max-height: 280px; overflow-y: auto;
  padding-right: 4px;
}
.parts-grid::-webkit-scrollbar { width: 4px; }
.parts-grid::-webkit-scrollbar-track { background: var(--surface2); border-radius: 4px; }
.parts-grid::-webkit-scrollbar-thumb { background: var(--pink2); border-radius: 4px; }

.part-card {
  background: var(--surface2);
  border: 2px solid var(--border2);
  border-radius: var(--radius-sm);
  padding: 8px 4px;
  cursor: pointer; transition: .2s;
  text-align: center; position: relative;
}
.part-card:hover { transform: translateY(-2px); border-color: var(--pink2); }
.part-card.equipped {
  border-color: var(--pink); background: rgba(233,100,157,0.08);
}
.part-card.locked {
  opacity: .6; cursor: default;
}
.part-card.locked:hover { transform: none; }
.part-preview { font-size: 28px; display: block; margin-bottom: 4px; }
.part-name { font-size: 10px; font-weight: 800; color: var(--text2); display: block; }
.part-cost {
  font-size: 10px; font-weight: 900; color: var(--gold);
  display: flex; align-items: center; justify-content: center; gap: 2px;
  margin-top: 3px;
}
.part-cost.owned { color: var(--mint); }
.lock-icon {
  position: absolute; top: 4px; right: 4px;
  font-size: 12px;
}
.equipped-badge {
  position: absolute; top: 4px; right: 4px;
  font-size: 10px; color: var(--pink);
}

/* トースト */
.toast {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: var(--text); color: white;
  padding: 10px 24px; border-radius: 20px;
  font-weight: 800; font-size: 14px;
  opacity: 0; pointer-events: none; z-index: 9999;
  transition: opacity .3s;
  white-space: nowrap;
}
.toast.show { opacity: 1; }
.toast.ok { background: var(--mint); }
.toast.ng { background: var(--pink); }

/* 購入モーダル */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.35);
  display: flex; align-items: center; justify-content: center;
  z-index: 999; opacity: 0; pointer-events: none; transition: .2s;
}
.modal-overlay.show { opacity: 1; pointer-events: all; }
.modal-box {
  background: white; border-radius: var(--radius);
  padding: 28px 24px; text-align: center;
  max-width: 300px; width: 90%;
  border: 2px solid var(--border2);
  transform: scale(.8); transition: .25s;
}
.modal-overlay.show .modal-box { transform: scale(1); }
.modal-preview { font-size: 56px; display: block; margin-bottom: 8px; }
.modal-title { font-size: 16px; font-weight: 900; color: var(--text); margin-bottom: 4px; }
.modal-cost { font-size: 18px; font-weight: 900; color: var(--gold); margin-bottom: 16px; }
.modal-btns { display: flex; gap: 10px; justify-content: center; }
.modal-btn {
  font-family: inherit; font-size: 14px; font-weight: 900;
  padding: 10px 22px; border-radius: 50px; border: none;
  cursor: pointer; transition: .15s;
}
.modal-btn.buy { background: var(--pink); color: white; box-shadow: 0 4px 12px rgba(233,100,157,0.3); }
.modal-btn.buy:hover { opacity: .88; }
.modal-btn.cancel { background: var(--surface2); color: var(--text2); border: 1.5px solid var(--border2); }

@keyframes popIn { from{opacity:0;transform:scale(.6)}to{opacity:1;transform:scale(1)} }
@keyframes bounce { 0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)} }
</style>
</head>

// ============================================================
// 状態管理
// ============================================================
let username = '';
let save = {};
let pendingBuy = null;
let currentCat = 'hair';

const DEFAULT_EQUIPPED = {
  hair: 'hair_short',
  clothes: 'clothes_simple',
  accessory: 'acc_none',
  face: 'face_happy',
};

// ============================================================
// Firebase
// ============================================================
async function init() {
  username = sessionStorage.getItem('sq_user');
  if (!username) { location.href = 'index.html'; return; }

  try {
    const snap = await getDoc(doc(db, 'users', username));
    if (snap.exists()) save = snap.data();
  } catch(e) {}

  if (!save.coins) save.coins = 0;
  if (!save.ownedParts) save.ownedParts = ['hair_short','clothes_simple','acc_none','face_happy'];
  if (!save.equipped) save.equipped = { ...DEFAULT_EQUIPPED };

  document.getElementById('avatar-username').textContent = username + ' ちゃん';
  document.getElementById('coin-count').textContent = save.coins;

  renderAvatar();
  renderShop(currentCat);
}

async function persist() {
  try { await setDoc(doc(db, 'users', username), save); } catch(e) {}
}

  document.getElementById('layer-body').innerHTML = `
    <ellipse cx="70" cy="145" rx="32" ry="22" fill="#ffd5b0"/>
    <rect x="52" y="130" width="36" height="30" rx="8" fill="#ffd5b0"/>
  `;

  // 各パーツ
  ['face', 'hair', 'clothes', 'accessory'].forEach(cat => {
    const id = save.equipped[cat];
    if (!id) return;
    const allParts = PARTS[cat];
    if (!allParts) return;
    const part = allParts.find(p => p.id === id);
    if (part && part.svg) {
      document.getElementById('layer-' + cat).innerHTML = part.svg;
    }
  });
}

// ============================================================
// ショップ描画
// ============================================================
function renderShop(cat) {
  currentCat = cat;
  const grid = document.getElementById('parts-grid');
  const parts = PARTS[cat];
  grid.innerHTML = '';

  parts.forEach(part => {
    const owned = (save.ownedParts || []).includes(part.id);
    const equipped = save.equipped[cat] === part.id;

    const card = document.createElement('div');
    card.className = 'part-card' + (equipped ? ' equipped' : '') + (!owned && part.cost > 0 ? ' locked' : '');

    let badgeHtml = '';
    if (equipped) badgeHtml = '<span class="equipped-badge">✓</span>';
    else if (!owned && part.cost > 0) badgeHtml = '<span class="lock-icon">🔒</span>';

    let costHtml = '';
    if (owned || part.cost === 0) {
      costHtml = `<div class="part-cost owned">✓ もってる</div>`;
    } else {
      costHtml = `<div class="part-cost">🪙 ${part.cost}</div>`;
    }

    card.innerHTML = `
      ${badgeHtml}
      <span class="part-preview">${part.emoji}</span>
      <span class="part-name">${part.name}</span>
      ${costHtml}
    `;

    card.onclick = () => onPartClick(part, cat, owned);
    grid.appendChild(card);
  });
}

// ============================================================
// パーツクリック
// ============================================================
function onPartClick(part, cat, owned) {
  if (owned || part.cost === 0) {
    // 装備する
    save.equipped[cat] = part.id;
    if (!save.ownedParts.includes(part.id)) save.ownedParts.push(part.id);
    persist();
    renderAvatar();
    renderShop(cat);
    showToast('着替えたよ！✨', 'ok');
  } else {
    // 購入確認
    if (part.cost > (save.coins || 0)) {
      showToast('コインが足りないよ…', 'ng');
      return;
    }
    pendingBuy = { part, cat };
    document.getElementById('modal-preview').textContent = part.emoji;
    document.getElementById('modal-title').textContent = part.name;
    document.getElementById('modal-cost').textContent = `🪙 ${part.cost} コイン`;
    document.getElementById('modal').classList.add('show');
  }
}

window.confirmBuy = function() {
  if (!pendingBuy) return;
  const { part, cat } = pendingBuy;
  save.coins = (save.coins || 0) - part.cost;
  if (!save.ownedParts) save.ownedParts = [];
  save.ownedParts.push(part.id);
  save.equipped[cat] = part.id;
  persist();
  document.getElementById('coin-count').textContent = save.coins;
  closeModal();
  renderAvatar();
  renderShop(cat);
  showToast(`${part.name} をゲット！🎉`, 'ok');
  pendingBuy = null;
};

window.closeModal = function() {
  document.getElementById('modal').classList.remove('show');
  pendingBuy = null;
};

window.switchCat = function(cat, btn) {
  document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderShop(cat);
};

// ============================================================
// トースト
// ============================================================
let toastTimer = null;
function showToast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + (type || '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = 'toast'; }, 2000);
}

init();
</script>
</body>
</html>
