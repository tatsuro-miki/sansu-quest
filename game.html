<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>さんすうクエスト</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap" rel="stylesheet">
<style>
/* ============================================================
   nosawa Kids Design System v1.0 — game.html
   index.htmlと統一したデザイントークン
============================================================ */
:root {
  --bg:       #f0f4ff;
  --surface:  #ffffff;
  --surface2: #e8eeff;
  --surface3: #dde5ff;
  --border:   rgba(0,0,0,0.08);
  --border2:  rgba(0,0,0,0.15);

  --primary:  #e94560;
  --primary2: #ff8fa3;
  --blue:     #4f8ef7;
  --blue2:    #a5c4fd;
  --gold:     #f5a623;
  --gold2:    #ffd980;
  --xp:       #2db87a;
  --xp2:      #7de8b8;
  --orange:   #fb923c;
  --purple:   #9f7aea;
  --heart:    #e94560;

  --text:     #1a1a2e;
  --text2:    #555577;
  --text3:    #9999bb;

  --radius:    20px;
  --radius-md: 14px;
  --radius-sm: 10px;

  /* 後方互換（アニメ等で使われている変数名をそのまま残す） */
  --card:     var(--surface);
  --glow-primary: 0 4px 20px rgba(233,69,96,.25);
  --glow-gold:    0 4px 20px rgba(245,166,35,.25);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Nunito', 'M PLUS Rounded 1c', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  color: var(--text);
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse at 15% 10%, rgba(79,142,247,0.10) 0%, transparent 45%),
    radial-gradient(ellipse at 85% 90%, rgba(233,69,96,0.08) 0%, transparent 45%);
  pointer-events: none;
}

.app { max-width: 640px; margin: 0 auto; padding: 16px 16px 100px; position: relative; z-index: 1; }

/* ============================================================
   Topbar
============================================================ */
.topbar {
  display: flex; align-items: center; gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 14px; padding: 10px 14px;
  background: var(--surface);
  border-radius: var(--radius-md);
  border: 1.5px solid var(--border2);
  overflow: hidden;
}
.user-name { font-size: .88rem; font-weight: 900; color: var(--gold); }
.streak-pill {
  display: flex; align-items: center; gap: 4px;
  background: var(--primary);
  padding: 5px 12px; border-radius: 20px;
  font-weight: 900; font-size: .85rem; color: white;
}
.streak-pill.shake { animation: headShake .4s ease; }
.xp-pill {
  display: flex; align-items: center; gap: 4px;
  background: rgba(45,184,122,0.12);
  border: 1.5px solid rgba(45,184,122,0.3);
  padding: 5px 12px; border-radius: 20px;
  font-weight: 900; font-size: .85rem; color: var(--xp);
}
.hearts { display: flex; gap: 2px; font-size: 1.2rem; }
.heart.lost { opacity: .22; transform: scale(.7); }
.logout-btn {
  margin-left: auto;
  font-family: inherit; font-size: .72rem; font-weight: 800;
  padding: 5px 10px; border-radius: var(--radius-sm);
  border: 1.5px solid var(--border2);
  background: var(--surface2); color: var(--text2); cursor: pointer;
  transition: background .15s;
}
.logout-btn:hover { background: var(--surface3); color: var(--text); }

/* ============================================================
   Level
============================================================ */
.level-section { margin-bottom: 14px; }
.level-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
.level-badge-big { display: flex; align-items: center; gap: 7px; font-weight: 900; font-size: .95rem; }
.level-orb {
  width: 34px; height: 34px; border-radius: 50%;
  background: var(--gold);
  display: flex; align-items: center; justify-content: center;
  font-weight: 900; font-size: .8rem; color: white;
  box-shadow: var(--glow-gold);
}
.xp-next { font-size: .75rem; color: var(--text2); font-weight: 700; }
.level-bar-wrap {
  height: 9px; background: var(--surface3);
  border-radius: 4px; overflow: hidden;
}
.level-bar {
  height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold2)); border-radius: 4px; transition: width .5s ease;
}

/* ============================================================
   Game Grid & Cards
============================================================ */
.game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
.card {
  background: var(--surface);
  border-radius: var(--radius-md);
  border: 1.5px solid var(--border2);
  padding: 12px 14px;
  display: flex; flex-direction: column; align-items: center; text-align: center;
  font-weight: 900; font-size: 1rem;
  color: var(--text);
  cursor: pointer; user-select: none;
  transition: all .2s;
}
.card:hover { transform: translateY(-3px); border-color: var(--primary); }
.card:active { transform: translateY(-1px); }
.card-icon { font-size: 2rem; margin-bottom: 6px; }
.card-label { font-size: .75rem; color: var(--text2); margin-top: 4px; font-weight: 700; }

/* ============================================================
   Question Area
============================================================ */
.question-area { display: none; }
.question-area.active { display: block; }
.question-card {
  background: var(--surface);
  border-radius: var(--radius);
  border: 2px solid var(--border);
  padding: 24px 20px;
  margin-bottom: 16px;
  text-align: center;
}
.question-title { font-size: .9rem; color: var(--text2); font-weight: 700; margin-bottom: 8px; }
.question-text { font-size: 2.4rem; font-weight: 900; color: var(--text); margin-bottom: 20px; line-height: 1.3; }
.question-sub { font-size: .9rem; color: var(--text2); font-weight: 700; }

.answer-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.answer-btn {
  background: var(--surface);
  border: 1.5px solid var(--border2);
  border-radius: var(--radius-md);
  padding: 16px 12px;
  font-family: inherit; font-weight: 900; font-size: 1.1rem;
  color: var(--text);
  cursor: pointer;
  transition: all .15s;
}
.answer-btn:hover { transform: translateY(-2px); border-color: var(--blue); background: rgba(79,142,247,0.05); }
.answer-btn.correct {
  background: var(--xp); color: white; border-color: var(--xp); animation: correctPulse .4s;
}
.answer-btn.incorrect {
  background: var(--primary); color: white; border-color: var(--primary); animation: shake .3s;
}
.answer-btn:disabled { opacity: .6; cursor: not-allowed; }

.feedback { display: none; text-align: center; margin-bottom: 14px; }
.feedback.visible { display: block; }
.feedback.ok { color: var(--xp); font-weight: 900; font-size: 1.1rem; }
.feedback.error { color: var(--primary); font-weight: 900; font-size: 1.1rem; }

.next-btn {
  width: 100%;
  background: var(--gold);
  border: none;
  border-radius: var(--radius-md);
  padding: 14px;
  font-family: inherit; font-weight: 900; font-size: .95rem;
  color: white;
  cursor: pointer;
  transition: all .15s;
  display: none;
}
.next-btn.visible { display: block; }
.next-btn:hover { transform: translateY(-2px); box-shadow: var(--glow-gold); }
.next-btn:active { transform: translateY(0); }

/* ============================================================
   Modals & Overlays
============================================================ */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.5); backdrop-filter: blur(3px);
  z-index: 100;
}
.modal-overlay.active { display: flex; align-items: center; justify-content: center; }
.modal {
  background: var(--surface);
  border-radius: var(--radius);
  border: 2px solid var(--border2);
  padding: 28px 24px;
  text-align: center;
  max-width: 340px;
  animation: popIn .3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.modal-icon { font-size: 3.5rem; margin-bottom: 12px; }
.modal-title { font-size: 1.4rem; font-weight: 900; color: var(--text); margin-bottom: 8px; }
.modal-message { font-size: .95rem; color: var(--text2); margin-bottom: 20px; line-height: 1.5; font-weight: 700; }
.modal-buttons { display: flex; gap: 10px; }
.modal-btn {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: var(--radius-sm);
  font-family: inherit; font-weight: 900; font-size: .85rem;
  cursor: pointer;
  transition: all .15s;
}
.modal-btn.primary { background: var(--gold); color: white; }
.modal-btn.primary:hover { transform: translateY(-2px); box-shadow: var(--glow-gold); }
.modal-btn.secondary { background: var(--surface2); color: var(--text2); border: 1.5px solid var(--border2); }
.modal-btn.secondary:hover { background: var(--surface3); color: var(--text); }

/* ============================================================
   Animations
============================================================ */
@keyframes popIn {
  0% { transform: scale(0.8) rotateX(-10deg); opacity: 0; }
  100% { transform: scale(1) rotateX(0); opacity: 1; }
}
@keyframes correctPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-8px); }
  75% { transform: translateX(8px); }
}
@keyframes headShake {
  0%, 100% { transform: rotate(0); }
  10%, 30%, 50%, 70%, 90% { transform: rotate(-2deg); }
  20%, 40%, 60%, 80% { transform: rotate(2deg); }
}
@keyframes slideUp {
  from { transform: translateY(40px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
@keyframes fadeOut {
  to { opacity: 0; transform: translateY(-20px); }
}

/* Responsive */
@media (max-width: 500px) {
  .app { padding: 12px 12px 80px; }
  .question-text { font-size: 2rem; }
  .modal { max-width: calc(100vw - 40px); }
}

/* ドット背景パターン */
.bg-pattern {
  position: fixed;
  bottom: 0; right: 0;
  width: 300px; height: 300px;
  pointer-events: none;
  z-index: 0;
  opacity: .05;
  background-image: radial-gradient(circle, var(--primary) 1px, transparent 1px);
  background-size: 24px 24px;
}
</style>
</head>
<body>

<div class="bg-pattern"></div>

<div class="app">

<div class="topbar">
  <span class="user-name" id="user-name">ゲスト</span>
  <span class="streak-pill" id="streak-pill">🔥<span id="streak-count">0</span></span>
  <span class="xp-pill" id="xp-pill">⭐<span id="xp-count">0</span></span>
  <div class="hearts" id="hearts-display"></div>
  <button class="logout-btn" id="logout-btn">ログアウト</button>
</div>

<div class="level-section">
  <div class="level-info">
    <div class="level-badge-big">
      <div class="level-orb" id="level-orb">1</div>
      <span id="level-label">初級</span>
    </div>
    <div class="xp-next" id="xp-next">次 / 100</div>
  </div>
  <div class="level-bar-wrap">
    <div class="level-bar" id="level-bar" style="width: 0%;"></div>
  </div>
</div>

<!-- Main Menu -->
<div class="game-grid" id="main-menu">
  <div class="card" data-difficulty="easy">
    <div class="card-icon">😊</div>
    <div>やさしい</div>
    <div class="card-label">+5コイン</div>
  </div>
  <div class="card" data-difficulty="mid">
    <div class="card-icon">😌</div>
    <div>ふつう</div>
    <div class="card-label">+10コイン</div>
  </div>
  <div class="card" data-difficulty="hard">
    <div class="card-icon">😤</div>
    <div>むずかしい</div>
    <div class="card-label">+20コイン</div>
  </div>
  <div class="card" data-difficulty="pet">
    <div class="card-icon">🐾</div>
    <div>ペット</div>
    <div class="card-label">育成ゲーム</div>
  </div>
</div>

<!-- Game Area -->
<div class="question-area" id="question-area">
  <div class="question-card">
    <div class="question-title" id="question-title"></div>
    <div class="question-text" id="question-text"></div>
    <div class="question-sub" id="question-sub"></div>
  </div>
  <div class="answer-buttons" id="answer-buttons"></div>
  <div class="feedback" id="feedback"></div>
  <button class="next-btn" id="next-btn">次の問題</button>
</div>

<!-- Pet Area -->
<div id="pet-area"></div>

</div>

<!-- Modals -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <div class="modal-icon" id="modal-icon"></div>
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-message" id="modal-message"></div>
    <div class="modal-buttons" id="modal-buttons"></div>
  </div>
</div>

<script>
const MAX_LV = 99;
const HEARTS_MAX = 3;
const CATEGORIES = ['たし算','ひき算','かけ算','わり算'];
const DIFF_LABELS = {easy:'イージー', mid:'ノーマル', hard:'ハード'};
const DIFF_MULTI = {easy:1, mid:1.2, hard:1.5};

// 難易度別のコイン倍率
const DIFFICULTY_LEVELS = {
  easy: { coin: 100, coins: '+100コイン', icon: '😊', label: 'やさしい' },
  mid: { coin: 200, coins: '+200コイン', icon: '😌', label: 'ふつう' },
  hard: { coin: 350, coins: '+350コイン', icon: '😤', label: 'むずかしい' }
};

const QUESTIONS = {
  'たし算': [
    {lv:1,q:'1+1=?',a:['2','3','4','5']},
    {lv:1,q:'2+3=?',a:['3','5','7','9']},
    {lv:2,q:'5+7=?',a:['12','13','14','15']},
    {lv:2,q:'8+9=?',a:['17','16','18','19']},
    {lv:3,q:'15+18=?',a:['33','32','31','30']},
    {lv:3,q:'25+19=?',a:['44','43','42','45']},
    {lv:4,q:'34+56=?',a:['90','91','89','92']},
    {lv:4,q:'78+45=?',a:['123','122','121','120']},
    {lv:5,q:'123+456=?',a:['579','580','578','577']},
  ],
  'ひき算': [
    {lv:1,q:'3-1=?',a:['2','3','4','1']},
    {lv:1,q:'5-2=?',a:['3','2','4','5']},
    {lv:2,q:'12-5=?',a:['7','8','6','9']},
    {lv:2,q:'15-8=?',a:['7','8','9','6']},
    {lv:3,q:'25-12=?',a:['13','14','15','12']},
    {lv:3,q:'30-17=?',a:['13','12','14','15']},
    {lv:4,q:'56-23=?',a:['33','32','31','34']},
    {lv:4,q:'100-45=?',a:['55','54','56','53']},
    {lv:5,q:'123-56=?',a:['67','68','66','69']},
  ],
  'かけ算': [
    {lv:1,q:'2×2=?',a:['4','3','5','6']},
    {lv:1,q:'3×2=?',a:['6','5','7','8']},
    {lv:2,q:'5×3=?',a:['15','14','16','13']},
    {lv:2,q:'4×6=?',a:['24','23','25','26']},
    {lv:3,q:'7×8=?',a:['56','55','57','54']},
    {lv:3,q:'9×9=?',a:['81','80','82','79']},
    {lv:4,q:'12×5=?',a:['60','59','61','62']},
    {lv:4,q:'15×7=?',a:['105','104','106','103']},
    {lv:5,q:'23×4=?',a:['92','91','93','94']},
  ],
  'わり算': [
    {lv:1,q:'4÷2=?',a:['2','1','3','4']},
    {lv:1,q:'6÷3=?',a:['2','1','3','4']},
    {lv:2,q:'12÷4=?',a:['3','2','4','5']},
    {lv:2,q:'15÷3=?',a:['5','4','6','7']},
    {lv:3,q:'24÷6=?',a:['4','3','5','6']},
    {lv:3,q:'36÷4=?',a:['9','8','10','7']},
    {lv:4,q:'56÷7=?',a:['8','7','9','6']},
    {lv:4,q:'72÷9=?',a:['8','7','9','6']},
    {lv:5,q:'100÷5=?',a:['20','19','21','22']},
  ]
};

const XP_TBL = [0,10,20,35,55,80,110,150,200,250];

// Game State
let save = {
  name: 'ゲスト',
  level: 1,
  xp: 0,
  hearts: HEARTS_MAX,
  coins: 0,
  questionStreak: 0,
  totalCorrect: 0,
  catCorrect: [0,0,0,0],
  dailyDone: 0,
  lastDaily: null,
  pet: { food: 0, questionsForFood: 0, level: 1, xp: 0 }
};

let difficulty = 'easy';
let category = 0;
let question = null;
let answered = false;
let correctIndex = 0;

// Utility
function R(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

function persistSave() {
  localStorage.setItem('save', JSON.stringify(save));
}

function loadSave() {
  const saved = localStorage.getItem('save');
  if (saved) save = {...save, ...JSON.parse(saved)};
}

function xpForLv(lv) { return XP_TBL[Math.min(lv, 8)] || 250; }

function lvName(lv) {
  if (lv <= 10) return ['初級','初級Ⅱ','中級','中級Ⅱ','上級','上級Ⅱ','超級','マスター','伝説','神'][lv-1];
  return `Lv${lv}`;
}

function showModal(icon, title, message='', buttons=[]) {
  document.getElementById('modal-icon').textContent = icon;
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-message').textContent = message;
  document.getElementById('modal-buttons').innerHTML = buttons.length ? buttons.map((b, i) =>
    `<button class="modal-btn ${b.type||'primary'}" onclick="handleModalBtn(${i})">${b.label}</button>`
  ).join('') : '<button class="modal-btn primary" onclick="closeModal()">OK</button>';
  document.getElementById('modal-overlay').classList.add('active');
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('active'); }
function handleModalBtn(idx) { closeModal(); }

// Sounds (simplified)
function soundCorrect() {}
function soundCombo() {}
function sound(name) {}

// Coins/Particles
function spawnCoins(n) { for(let i=0;i<n;i++) spawnCoin(); }
function spawnCoin() {
  const coin = document.createElement('div');
  coin.style.cssText = 'position:fixed;left:' + R(20, 80) + '%;top:' + R(20, 60) + '%;font-size:2rem;z-index:50;pointer-events:none;';
  coin.textContent = '🪙';
  document.body.appendChild(coin);
  let top = parseInt(coin.style.top);
  let opacity = 1;
  const anim = setInterval(() => {
    top -= 2;
    opacity -= 0.02;
    coin.style.top = top + 'px';
    coin.style.opacity = opacity;
    if (opacity <= 0) { clearInterval(anim); coin.remove(); }
  }, 30);
}

function spawnStars(n) { for(let i=0;i<n;i++) spawnStar(); }
function spawnStar() {
  const star = document.createElement('div');
  star.style.cssText = 'position:fixed;left:' + R(10, 90) + '%;top:' + R(10, 70) + '%;font-size:1.5rem;z-index:50;pointer-events:none;animation:slideUp 0.8s ease-out forwards;';
  star.textContent = '⭐';
  document.body.appendChild(star);
  setTimeout(() => star.remove(), 800);
}

// UI Updates
function renderUI() {
  document.getElementById('user-name').textContent = save.name;
  document.getElementById('streak-count').textContent = save.questionStreak;
  document.getElementById('xp-count').textContent = save.xp;
  document.getElementById('level-orb').textContent = save.level;
  document.getElementById('level-label').textContent = lvName(save.level);
  const nextXp = xpForLv(save.level);
  document.getElementById('xp-next').textContent = save.xp + ' / ' + nextXp;
  document.getElementById('level-bar').style.width = (save.xp / nextXp * 100) + '%';
  
  const hearts = [];
  for (let i = 0; i < HEARTS_MAX; i++) {
    hearts.push(`<span class="heart ${i >= save.hearts ? 'lost' : ''}" style="opacity:${i >= save.hearts ? 0.22 : 1}">❤️</span>`);
  }
  document.getElementById('hearts-display').innerHTML = hearts.join('');
  
  const coins = [];
  coins.push(`<div class="card" data-difficulty="easy">
    <div class="card-icon">😊</div>
    <div>やさしい</div>
    <div class="card-label">+100コイン</div>
  </div>`);
  coins.push(`<div class="card" data-difficulty="mid">
    <div class="card-icon">😌</div>
    <div>ふつう</div>
    <div class="card-label">+200コイン</div>
  </div>`);
  coins.push(`<div class="card" data-difficulty="hard">
    <div class="card-icon">😤</div>
    <div>むずかしい</div>
    <div class="card-label">+350コイン</div>
  </div>`);
  coins.push(`<div class="card" data-difficulty="pet">
    <div class="card-icon">🐾</div>
    <div>ペット</div>
    <div class="card-label">育成ゲーム</div>
  </div>`);
  document.getElementById('main-menu').innerHTML = coins.join('');
  document.querySelectorAll('#main-menu .card').forEach(el => {
    el.addEventListener('click', () => startGame(el.dataset.difficulty));
  });
}

function showQuestion() {
  document.getElementById('question-area').classList.add('active');
  document.getElementById('main-menu').style.display = 'none';
  document.getElementById('question-title').textContent = CATEGORIES[category];
  document.getElementById('question-text').textContent = question.q;
  document.getElementById('question-sub').textContent = '';
  
  const btns = document.getElementById('answer-buttons');
  btns.innerHTML = '';
  for (let i = 0; i < question.a.length; i++) {
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.textContent = question.a[i];
    btn.onclick = () => checkAnswer(i);
    btns.appendChild(btn);
  }
  document.getElementById('feedback').innerHTML = '';
  document.getElementById('next-btn').classList.remove('visible');
}

function checkAnswer(idx) {
  if (answered) return;
  answered = true;
  
  const btns = document.querySelectorAll('.answer-btn');
  btns.forEach((b, i) => {
    b.disabled = true;
    if (i === correctIndex) {
      b.classList.add('correct');
      onCorrect();
    } else if (i === idx) {
      b.classList.add('incorrect');
      onWrong();
    }
  });
}

function onCorrect() {
  answered = true;
  trackCategoryProgress();
  
  const baseXp = XP_TBL[question.lv];
  const multi = DIFF_MULTI[difficulty] || 1;
  const xpAmt = Math.round(baseXp * multi);
  
  save.questionStreak = (save.questionStreak || 0) + 1;
  const bonus = save.questionStreak % 5 === 0 ? 10 : 0;
  const isCombo = save.questionStreak % 3 === 0;
  
  save.totalCorrect = (save.totalCorrect || 0) + 1;
  save.catCorrect = save.catCorrect || [0,0,0,0];
  save.catCorrect[category] = (save.catCorrect[category] || 0) + 1;
  save.dailyDone = (save.dailyDone || 0) + 1;
  save.xp = (save.xp || 0) + xpAmt + bonus;
  
  const coinAmt = difficulty === 'hard' ? 350 : difficulty === 'mid' ? 200 : 100;
  save.coins = (save.coins || 0) + coinAmt;
  
  // むずかしい5問連続ボーナス
  if (difficulty === 'hard') {
    save.hardStreak = (save.hardStreak || 0) + 1;
    if (save.hardStreak >= 5) {
      save.coins += 50;
      save.hardStreak = 0;
      // ボーナス表示
      setTimeout(() => {
        const el = document.createElement('div');
        el.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:2rem;font-weight:900;color:#f5a623;z-index:9999;pointer-events:none;background:white;padding:12px 24px;border-radius:20px;';
        el.textContent = '🪙 ボーナス+50！';
        document.body.appendChild(el);
        setTimeout(() => { el.style.transition='opacity .5s'; el.style.opacity='0'; setTimeout(()=>el.remove(),500); }, 3000);
      }, 400);
    }
  }
  
  let leveled = false;
  if (!save.level) save.level = 1;
  while (save.level < MAX_LV && save.xp >= xpForLv(save.level)) {
    save.xp -= xpForLv(save.level);
    save.level++;
    leveled = true;
  }
  
  flashScreen('correct-flash');
  if (isCombo) {
    soundCombo();
    spawnCoins(12);
    spawnStars(6);
  } else {
    soundCorrect();
    spawnCoins(5);
    spawnStars(3);
  }
  
  if (leveled) {
    save.hearts = HEARTS_MAX;
    setTimeout(() => showLevelUpOverlay(save.level, lvName(save.level)), 500);
  }
  
  checkBadges();
  persistSave();
  renderUI();
  renderBadges();
  
  const msgs = ['ありがとう！🌟','すばらしい！✨','よくできました！⭐','その調子！🔥','天才！🧠','完璧！🎯'];
  const diffTag = multi > 1 ? ` ${DIFF_LABELS[difficulty]}ボーナス×${multi}！` : '';
  setFeedback('ok', msgs[R(0, msgs.length-1)] + (bonus ? ` コンボ+${bonus}XP！` : '') + diffTag);
  showXpPop(`+${xpAmt+bonus}XP`);
  showCoinPop(coinAmt);
  if (isCombo) showCombo(`🔥×${save.questionStreak}`);
  
  const _dg = dailyGoal(save.level || 1);
  if (save.dailyDone === _dg) setTimeout(() => showModal('🎊', 'デイリーゴール達成！', `本日の${_dg}問をクリアしました！`, [{label:'OK', type:'primary'}]), 500);
  
  setTimeout(() => document.getElementById('next-btn').classList.add('visible'), 800);
}

function onWrong() {
  save.questionStreak = 0;
  save.hearts = (save.hearts || 0) - 1;
  
  if (save.hearts <= 0) {
    save.hearts = 0;
    persistSave();
    setTimeout(() => showModal('💔', 'ゲームオーバー', 'ハートがなくなりました。', [{label:'もう一度',type:'primary'}, {label:'メニュー',type:'secondary'}]), 300);
    return;
  }
  
  persistSave();
  renderUI();
  setFeedback('error', 'ざんねん....');
  setTimeout(() => document.getElementById('next-btn').classList.add('visible'), 1200);
}

function startGame(diff) {
  if (diff === 'pet') {
    showModal('🐾', 'ペット育成', 'このゲームはもうすぐ開始予定です！', [{label:'OK',type:'primary'}]);
    return;
  }
  
  difficulty = diff;
  category = R(0, 3);
  const qs = QUESTIONS[CATEGORIES[category]];
  question = qs[R(0, qs.length-1)];
  correctIndex = R(0, question.a.length-1);
  
  if (correctIndex !== 0) {
    const temp = question.a[0];
    question.a[0] = question.a[correctIndex];
    question.a[correctIndex] = temp;
    correctIndex = 0;
  }
  
  answered = false;
  document.getElementById('main-menu').style.display = 'none';
  showQuestion();
}

function setFeedback(type, msg) {
  const fb = document.getElementById('feedback');
  fb.className = 'feedback visible ' + type;
  fb.textContent = msg;
}

function showXpPop(text) {
  const pop = document.createElement('div');
  pop.style.cssText = 'position:fixed;top:80px;right:20px;font-size:1.2rem;font-weight:900;color:#2db87a;animation:slideUp 0.8s ease-out forwards;z-index:50;';
  pop.textContent = text;
  document.body.appendChild(pop);
  setTimeout(() => pop.remove(), 800);
}

function showCoinPop(amt) {
  const pop = document.createElement('div');
  pop.style.cssText = 'position:fixed;bottom:20px;left:20px;font-size:1.2rem;font-weight:900;color:#f5a623;animation:slideUp 0.8s ease-out forwards;z-index:50;';
  pop.textContent = `+${amt}🪙`;
  document.body.appendChild(pop);
  setTimeout(() => pop.remove(), 800);
}

function showCombo(text) {
  const combo = document.createElement('div');
  combo.style.cssText = 'position:fixed;bottom:100px;left:50%;transform:translateX(-50%);font-size:2.4rem;font-weight:900;color:#fb923c;animation:slideUp 0.8s ease-out forwards;z-index:50;';
  combo.textContent = text;
  document.body.appendChild(combo);
  setTimeout(() => combo.remove(), 800);
}

function flashScreen(cssClass) {
  const flash = document.createElement('div');
  flash.style.cssText = 'position:fixed;inset:0;background:rgba(45,184,122,0.2);animation:fadeOut 0.4s ease-out forwards;z-index:40;pointer-events:none;';
  document.body.appendChild(flash);
  setTimeout(() => flash.remove(), 400);
}

function nextQuestion() {
  answered = false;
  question = QUESTIONS[CATEGORIES[category]][R(0, QUESTIONS[CATEGORIES[category]].length-1)];
  correctIndex = R(0, question.a.length-1);
  if (correctIndex !== 0) {
    const temp = question.a[0];
    question.a[0] = question.a[correctIndex];
    question.a[correctIndex] = temp;
    correctIndex = 0;
  }
  showQuestion();
}

function trackCategoryProgress() {}
function checkBadges() {}
function renderBadges() {}

function dailyGoal(lv) { return Math.max(5, Math.ceil(lv / 2)); }

function showLevelUpOverlay(lv, name) {
  showModal('🎉', `レベルアップ！Lv${lv}`, `「${name}」に上昇しました！`, [{label:'次へ',type:'primary'}]);
}

// Init
document.addEventListener('DOMContentLoaded', () => {
  loadSave();
  renderUI();
  
  document.getElementById('next-btn').addEventListener('click', nextQuestion);
  document.getElementById('logout-btn').addEventListener('click', () => {
    localStorage.clear();
    location.reload();
  });
});
</script>

</body>
