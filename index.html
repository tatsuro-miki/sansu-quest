<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>さんすうクエスト</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     nosawa Kids Design System v1.0
     nosawa Design System を子ども向けにアレンジ
     ・配色は賑やかに、でも整理されたパレット
     ・構造・余白・フォントはnosawa流
     ============================================================ */
  :root {
    /* Surfaces — nosawa流の段階的サーフェス */
    --bg:      #f0f4ff;
    --surface: #ffffff;
    --surface2: #e8eeff;

    /* Borders — nosawa流、少し丸みのある子ども向け */
    --border:  rgba(0,0,0,0.08);
    --border2: rgba(0,0,0,0.15);

    /* メインカラー — 整理された3色パレット */
    --primary:  #e94560;   /* 赤ピンク：アクション */
    --primary2: #ff8fa3;   /* 薄いピンク */
    --blue:     #4f8ef7;   /* ブルー：情報 */
    --blue2:    #a5c4fd;
    --gold:     #f5a623;   /* ゴールド：実績 */
    --gold2:    #ffd980;
    --green:    #2db87a;   /* グリーン：成功・XP */
    --green2:   #7de8b8;

    /* Typography */
    --text:  #1a1a2e;
    --text2: #555577;
    --text3: #9999bb;

    /* 角丸 — 子ども向けなので大きめ */
    --radius-lg: 22px;
    --radius-md: 14px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', 'M PLUS Rounded 1c', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
  }

  /* 背景の装飾 — シンプルに整理 */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 15% 10%, rgba(79,142,247,0.12) 0%, transparent 45%),
      radial-gradient(ellipse at 85% 90%, rgba(233,69,96,0.10) 0%, transparent 45%);
    pointer-events: none;
  }

  .wrap {
    width: 100%;
    max-width: 440px;
    padding: 28px 16px;
    position: relative;
    z-index: 1;
    animation: fadeDown .4s ease;
  }

  /* ============================================================
     タイトル
  ============================================================ */
  .title-area {
    text-align: center;
    margin-bottom: 28px;
  }
  .title-area h1 {
    font-size: 2.4rem;
    font-weight: 900;
    color: var(--primary);
    letter-spacing: -0.01em;
    line-height: 1.1;
    margin-bottom: 6px;
  }
  .title-icon {
    display: block;
    font-size: 3rem;
    margin-bottom: 8px;
  }
  .sub {
    color: var(--text2);
    font-size: 0.92rem;
    font-weight: 700;
  }

  /* ============================================================
     カード — nosawa流の構造
  ============================================================ */
  .card {
    background: var(--surface);
    border-radius: var(--radius-lg);
    padding: 20px 18px;
    border: 1.5px solid var(--border2);
    margin-bottom: 14px;
  }

  .card-label {
    font-size: 0.75rem;
    font-weight: 900;
    color: var(--text3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .card-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border2);
  }

  /* ============================================================
     名前入力エリア
  ============================================================ */
  .new-user-wrap {
    display: flex;
    gap: 8px;
    margin-bottom: 4px;
  }
  .name-input {
    flex: 1;
    font-family: inherit;
    font-size: 1rem;
    font-weight: 800;
    padding: 11px 14px;
    background: var(--surface2);
    color: var(--text);
    border: 1.5px solid var(--border2);
    border-radius: var(--radius-md);
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }
  .name-input:focus {
    border-color: var(--primary);
    background: rgba(233,69,96,0.05);
  }
  .name-input::placeholder { color: var(--text3); }

  .add-btn {
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 900;
    padding: 11px 16px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: var(--radius-md);
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.2s, transform 0.15s;
  }
  .add-btn:hover { opacity: 0.88; transform: translateY(-1px); }
  .add-btn:active { transform: translateY(0); }
  .add-btn:disabled { opacity: 0.4; pointer-events: none; }

  /* ============================================================
     ユーザーグリッド
  ============================================================ */
  .user-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .user-btn {
    padding: 16px 10px;
    border-radius: var(--radius-md);
    border: 1.5px solid var(--border2);
    background: var(--surface2);
    color: var(--text);
    font-family: inherit;
    font-size: 0.95rem;
    font-weight: 900;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
    text-align: center;
  }
  .user-btn .av   { font-size: 2.2rem; display: block; margin-bottom: 6px; }
  .user-btn .uname { display: block; margin-bottom: 4px; }
  .user-btn .xp-tag { font-size: 0.72rem; color: var(--green); display: block; font-weight: 800; }
  .user-btn .lv-tag { font-size: 0.68rem; color: var(--gold); font-weight: 800; }
  .user-btn:hover {
    border-color: var(--primary);
    background: rgba(233,69,96,0.06);
    transform: translateY(-2px);
  }
  .user-btn.loading-btn { opacity: 0.5; pointer-events: none; }

  /* ============================================================
     ランキングカード
  ============================================================ */
  .ranking-card {
    background: var(--surface);
    border-radius: var(--radius-lg);
    padding: 20px 18px;
    border: 1.5px solid var(--border2);
  }

  /* タブ */
  .rank-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 14px;
  }
  .rank-tab {
    flex: 1;
    font-family: inherit;
    font-size: 0.8rem;
    font-weight: 900;
    padding: 8px 6px;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--border2);
    background: var(--surface2);
    color: var(--text2);
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .rank-tab.active {
    border-color: var(--gold);
    background: rgba(245,166,35,0.1);
    color: var(--gold);
  }
  .rank-tab.test-tab.active {
    border-color: var(--blue);
    background: rgba(79,142,247,0.1);
    color: var(--blue);
  }

  /* ランキング行 */
  .anon-note {
    font-size: 0.72rem;
    color: var(--text3);
    font-weight: 700;
    text-align: center;
    margin-bottom: 10px;
  }
  .rank-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    border-radius: var(--radius-sm);
    background: var(--surface2);
    border: 1px solid var(--border);
    margin-bottom: 6px;
  }
  .rank-no   { font-size: 1rem; font-weight: 900; width: 26px; text-align: center; }
  .rank-name { flex: 1; font-weight: 800; font-size: 0.9rem; }
  .rank-streak { font-size: 0.72rem; color: var(--primary); font-weight: 800; }
  .rank-xp   { font-size: 0.82rem; font-weight: 900; color: var(--green); }
  .rank-score { font-size: 0.82rem; font-weight: 900; color: var(--blue); }
  .rank-testlv { font-size: 0.68rem; color: var(--text3); font-weight: 700; }

  /* ============================================================
     共通
  ============================================================ */
  .loading-msg {
    text-align: center;
    color: var(--text3);
    font-size: 0.88rem;
    font-weight: 700;
    padding: 14px;
  }
  .error-msg {
    color: var(--primary);
    font-size: 0.82rem;
    font-weight: 800;
    padding: 8px 12px;
    background: rgba(233,69,96,0.08);
    border: 1px solid rgba(233,69,96,0.2);
    border-radius: var(--radius-sm);
    margin-top: 10px;
    display: none;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-12px); }
    to   { opacity: 1; transform: none; }
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25%     { transform: translateX(-6px); }
    75%     { transform: translateX(6px); }
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="title-area">
    <span class="title-icon">🧮</span>
    <h1>さんすうクエスト</h1>
    <p class="sub">なまえをえらんでスタート！</p>
  </div>

  <div class="card">
    <div class="card-label">🆕 はじめての人</div>
    <div class="new-user-wrap">
      <input class="name-input" id="name-input" type="text" maxlength="8" placeholder="ニックネーム（8文字まで）">
      <button class="add-btn" id="add-btn">➕ 追加</button>
    </div>
  </div>

  <div class="card">
    <div class="card-label">👤 プレーヤーをえらぼう</div>
    <div class="user-grid" id="user-grid">
      <div class="loading-msg" style="grid-column:1/-1">⏳ よみこみちゅう...</div>
    </div>
    <div class="error-msg" id="error-msg"></div>
  </div>

  <div class="ranking-card">
    <div class="rank-tabs">
      <button class="rank-tab active" id="tab-xp" onclick="switchTab('xp')">🏆 XPランキング</button>
      <button class="rank-tab test-tab" id="tab-test" onclick="switchTab('test')">⚡ テストランキング</button>
    </div>
    <div class="anon-note">※ なまえはひみつにしてあるよ</div>
    <div id="ranking-area"><div class="loading-msg">⏳ よみこみちゅう...</div></div>
    <div id="test-ranking-area" style="display:none"><div class="loading-msg">⏳ よみこみちゅう...</div></div>
  </div>

</div>

<script type="module">
import { FIREBASE_CONFIG } from './firebase.js';
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, doc, getDoc, setDoc, collection, getDocs } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const app = initializeApp(FIREBASE_CONFIG);
const db  = getFirestore(app);
const HEARTS_MAX = 5;

const ANON_NAMES = [
  ['🐼','パンダ'],['🦁','ライオン'],['🐧','ペンギン'],['🐨','コアラ'],['🦒','キリン'],
  ['🐘','ゾウ'],['🐯','トラ'],['🐰','ウサギ'],['🐬','イルカ'],['🦉','フクロウ'],
  ['🌸','サクラ'],['🌻','ヒマワリ'],['🌷','チューリップ'],['🌹','バラ'],['💐','コスモス'],
  ['🚀','ロケット'],['🚄','シンカンセン'],['🚁','ヘリコプター'],['🎈','バルーン'],['⛵','ヨット'],
];
function anonName(username) {
  let seed = 0;
  for (let i = 0; i < username.length; i++) seed += username.charCodeAt(i) * (i+1);
  const [emoji, name] = ANON_NAMES[seed % ANON_NAMES.length];
  return `${emoji} ${name}`;
}

const AVATARS = ['🧒','👦','👧','🧑','👩','👨','🧒‍♀️','🧑‍🎓','🦸','🧙'];

async function loadAllUsers() {
  const snap = await getDocs(collection(db, 'users'));
  const users = [];
  snap.forEach(d => users.push({ name: d.id, ...d.data() }));
  return users.sort((a,b) => (a.createdAt||0) - (b.createdAt||0));
}
async function loadUser(name) {
  const snap = await getDoc(doc(db, 'users', name));
  return snap.exists() ? snap.data() : null;
}
async function createUser(name, avatarIndex) {
  const data = {
    xp:0, level:1, totalCorrect:0, hearts:HEARTS_MAX,
    lastHeartRegen:Date.now(), streak:0, lastLogin:'',
    loginDays:0, dailyDone:0, dailyDate:'',
    unlockedBadges:[], catCorrect:[0,0,0,0],
    questionStreak:0, avatarIndex, createdAt:Date.now(),
  };
  await setDoc(doc(db, 'users', name), data);
  return data;
}

function renderUsers(users) {
  const grid = document.getElementById('user-grid');
  if (users.length === 0) {
    grid.innerHTML = '<div class="loading-msg" style="grid-column:1/-1">まだプレーヤーがいないよ！<br>上に名前を入力して追加しよう🎮</div>';
    return;
  }
  grid.innerHTML = '';
  users.forEach((u, i) => {
    const av = AVATARS[u.avatarIndex ?? i % AVATARS.length];
    const btn = document.createElement('button');
    btn.className = 'user-btn';
    btn.innerHTML = `
      <span class="av">${av}</span>
      <span class="uname">${u.name}</span>
      <span class="xp-tag">⭐ ${u.xp||0} XP</span>
      <span class="lv-tag">Lv.${u.level||1}</span>
    `;
    btn.addEventListener('click', () => selectUser(u.name, btn));
    grid.appendChild(btn);
  });
}

const myName = sessionStorage.getItem('sq_user') || '';

function displayName(u) {
  return u.name === myName
    ? `<span style="color:var(--gold);font-weight:900">👤 ${u.name}（あなた）</span>`
    : anonName(u.name);
}

function renderRanking(users) {
  const medals = ['🥇','🥈','🥉'];
  const sorted = [...users].sort((a,b) => (b.xp||0) - (a.xp||0));
  const html = sorted.slice(0,10).map((u,i) => `
    <div class="rank-row" ${u.name===myName?'style="background:rgba(245,166,35,0.08);border-color:rgba(245,166,35,0.3)"':''}>
      <span class="rank-no">${medals[i]||i+1}</span>
      <span class="rank-name">${displayName(u)}</span>
      <span class="rank-streak">🔥${u.loginDays||0}日</span>
      <span class="rank-xp">⭐${u.xp||0}</span>
    </div>
  `).join('');
  document.getElementById('ranking-area').innerHTML = html || '<div class="loading-msg">まだデータなし</div>';
}

function renderTestRanking(users) {
  const medals = ['🥇','🥈','🥉'];
  const TEST_LV_NAMES = ['','テストLv1','テストLv2','テストLv3','テストLv4','テストLv5'];
  const withScore = users.filter(u => (u.bestTestScore||0) > 0);
  const sorted = [...withScore].sort((a,b) => (b.bestTestScore||0) - (a.bestTestScore||0));
  if (sorted.length === 0) {
    document.getElementById('test-ranking-area').innerHTML =
      '<div class="loading-msg">⚡ Lv5でテストモードが解放されるよ！</div>';
    return;
  }
  const html = sorted.slice(0,10).map((u,i) => `
    <div class="rank-row" ${u.name===myName?'style="background:rgba(245,166,35,0.08);border-color:rgba(245,166,35,0.3)"':''}>
      <span class="rank-no">${medals[i]||i+1}</span>
      <span class="rank-name">${displayName(u)}</span>
      <span class="rank-testlv">${TEST_LV_NAMES[u.bestTestLv||1]||''}</span>
      <span class="rank-score">⚡${u.bestTestScore||0}点</span>
    </div>
  `).join('');
  document.getElementById('test-ranking-area').innerHTML = html;
}

window.switchTab = function(tab) {
  const xpArea   = document.getElementById('ranking-area');
  const testArea  = document.getElementById('test-ranking-area');
  const tabXp    = document.getElementById('tab-xp');
  const tabTest  = document.getElementById('tab-test');
  if (tab === 'xp') {
    xpArea.style.display = 'block'; testArea.style.display = 'none';
    tabXp.classList.add('active'); tabTest.classList.remove('active');
  } else {
    xpArea.style.display = 'none'; testArea.style.display = 'block';
    tabXp.classList.remove('active'); tabTest.classList.add('active');
  }
};

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg; el.style.display = 'block';
  el.style.animation = 'none';
  requestAnimationFrame(() => el.style.animation = 'shake .3s ease');
  setTimeout(() => { el.style.display = 'none'; }, 3000);
}

async function addUser() {
  const input = document.getElementById('name-input');
  const btn   = document.getElementById('add-btn');
  const name  = input.value.trim();
  if (!name) { showError('なまえを入力してね！'); return; }
  if (name.length > 8) { showError('8文字いないで入力してね！'); return; }
  btn.disabled = true; btn.textContent = '⏳';
  try {
    let data = await loadUser(name);
    if (!data) {
      const all = await loadAllUsers();
      data = await createUser(name, all.length % AVATARS.length);
    }
    sessionStorage.setItem('sq_user', name);
    sessionStorage.setItem('sq_data', JSON.stringify(data));
    location.href = 'game.html';
  } catch(e) {
    showError('エラーが発生しました。もう一度試してね。');
    btn.disabled = false; btn.textContent = '➕ 追加';
  }
}

async function selectUser(name, btn) {
  btn.classList.add('loading-btn');
  try {
    const data = await loadUser(name);
    sessionStorage.setItem('sq_user', name);
    sessionStorage.setItem('sq_data', JSON.stringify(data));
    location.href = 'game.html';
  } catch(e) {
    showError('よみこみに失敗しました。');
    btn.classList.remove('loading-btn');
  }
}

document.getElementById('add-btn').addEventListener('click', addUser);
document.getElementById('name-input').addEventListener('keydown', e => { if (e.key === 'Enter') addUser(); });

async function init() {
  try {
    const users = await loadAllUsers();
    renderUsers(users);
    renderRanking(users);
    renderTestRanking(users);
  } catch(e) {
    showError('Firebase接続エラー。firebase.jsの設定値を確認してください。');
    document.getElementById('user-grid').innerHTML = '<div class="loading-msg" style="grid-column:1/-1;color:var(--primary)">接続エラー</div>';
    document.getElementById('ranking-area').innerHTML = '<div class="loading-msg" style="color:var(--primary)">接続エラー</div>';
  }
}
init();
</script>
</body>
</html>
