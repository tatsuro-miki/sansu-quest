<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>さんすうクエスト</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap" rel="stylesheet">
<style>
/* ============================================================
   nosawa Kids Design System v1.0 — game.html
   index.htmlと統一したデザイントークン
============================================================ */
:root {
  --bg:       #f0f4ff;
  --surface:  #ffffff;
  --surface2: #e8eeff;
  --surface3: #dde5ff;
  --border:   rgba(0,0,0,0.08);
  --border2:  rgba(0,0,0,0.15);

  --primary:  #e94560;
  --primary2: #ff8fa3;
  --blue:     #4f8ef7;
  --blue2:    #a5c4fd;
  --gold:     #f5a623;
  --gold2:    #ffd980;
  --xp:       #2db87a;
  --xp2:      #7de8b8;
  --orange:   #fb923c;
  --purple:   #9f7aea;
  --heart:    #e94560;

  --text:     #1a1a2e;
  --text2:    #555577;
  --text3:    #9999bb;

  --radius:    20px;
  --radius-md: 14px;
  --radius-sm: 10px;

  /* 後方互換（アニメ等で使われている変数名をそのまま残す） */
  --card:     var(--surface);
  --glow-primary: 0 4px 20px rgba(233,69,96,.25);
  --glow-gold:    0 4px 20px rgba(245,166,35,.25);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Nunito', 'M PLUS Rounded 1c', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  color: var(--text);
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse at 15% 10%, rgba(79,142,247,0.10) 0%, transparent 45%),
    radial-gradient(ellipse at 85% 90%, rgba(233,69,96,0.08) 0%, transparent 45%);
  pointer-events: none;
}

.app { max-width: 640px; margin: 0 auto; padding: 16px 16px 100px; position: relative; z-index: 1; }

/* ============================================================
   Topbar
============================================================ */
.topbar {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 14px; padding: 10px 14px;
  background: var(--surface);
  border-radius: var(--radius-md);
  border: 1.5px solid var(--border2);
}
.user-name { font-size: .88rem; font-weight: 900; color: var(--gold); }
.streak-pill {
  display: flex; align-items: center; gap: 4px;
  background: var(--primary);
  padding: 5px 12px; border-radius: 20px;
  font-weight: 900; font-size: .85rem; color: white;
}
.streak-pill.shake { animation: headShake .4s ease; }
.xp-pill {
  display: flex; align-items: center; gap: 4px;
  background: rgba(45,184,122,0.12);
  border: 1.5px solid rgba(45,184,122,0.3);
  padding: 5px 12px; border-radius: 20px;
  font-weight: 900; font-size: .85rem; color: var(--xp);
}
.hearts { display: flex; gap: 2px; font-size: 1.2rem; }
.heart.lost { opacity: .22; transform: scale(.7); }
.logout-btn {
  margin-left: auto;
  font-family: inherit; font-size: .72rem; font-weight: 800;
  padding: 5px 10px; border-radius: var(--radius-sm);
  border: 1.5px solid var(--border2);
  background: var(--surface2); color: var(--text2); cursor: pointer;
  transition: background .15s;
}
.logout-btn:hover { background: var(--surface3); color: var(--text); }

/* ============================================================
   Level
============================================================ */
.level-section { margin-bottom: 14px; }
.level-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
.level-badge-big { display: flex; align-items: center; gap: 7px; font-weight: 900; font-size: .95rem; }
.level-orb {
  width: 34px; height: 34px; border-radius: 50%;
  background: var(--gold);
  display: flex; align-items: center; justify-content: center;
  font-weight: 900; font-size: .8rem; color: white;
  box-shadow: var(--glow-gold);
}
.xp-next { font-size: .75rem; color: var(--text2); font-weight: 700; }
.level-bar-wrap {
  height: 9px; background: var(--surface3);
  border-radius: 10px; overflow: hidden;
  border: 1px solid var(--border2);
}
.level-bar {
  height: 100%; border-radius: 10px;
  background: linear-gradient(90deg, var(--xp), var(--blue));
  transition: width .6s cubic-bezier(.34,1.56,.64,1);
}

/* ============================================================
   Daily
============================================================ */
.daily-goal {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 14px 18px; margin-bottom: 14px;
  border: 1.5px solid var(--border2);
  display: flex; align-items: center; gap: 12px;
}
.goal-icon { font-size: 2rem; }
.goal-text { flex: 1; }
.goal-title { font-weight: 900; font-size: .9rem; margin-bottom: 3px; }
.goal-sub { font-size: .75rem; color: var(--text2); font-weight: 700; }
.goal-ring { width: 50px; height: 50px; flex-shrink: 0; position: relative; }
.goal-ring svg { transform: rotate(-90deg); }
.ring-bg { fill: none; stroke: var(--surface3); stroke-width: 5; }
.ring-fg {
  fill: none; stroke: var(--gold); stroke-width: 5; stroke-linecap: round;
  transition: stroke-dashoffset .6s cubic-bezier(.34,1.56,.64,1);
}
.ring-text {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-weight: 900; font-size: .72rem; color: var(--gold);
}

/* ============================================================
   Categories
============================================================ */
.categories {
  display: grid; grid-template-columns: repeat(4,1fr);
  gap: 8px; margin-bottom: 14px;
}
.cat-btn {
  background: var(--surface);
  border: 1.5px solid var(--border2);
  border-radius: var(--radius-md);
  padding: 9px 5px; cursor: pointer;
  text-align: center; font-family: inherit;
  transition: .2s; color: var(--text);
}
.cat-btn .icon { font-size: 1.4rem; display: block; margin-bottom: 2px; }
.cat-btn .label { font-size: .68rem; font-weight: 800; color: var(--text2); }
.cat-btn.active {
  border-color: var(--primary);
  background: rgba(233,69,96,0.08);
}
.cat-btn:hover { transform: translateY(-2px); }

/* ============================================================
   難易度
============================================================ */
.diff-select { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 14px; }
.diff-btn {
  font-family: inherit;
  background: var(--surface);
  border: 1.5px solid var(--border2);
  border-radius: var(--radius-md);
  padding: 10px 6px; cursor: pointer;
  text-align: center; transition: .2s; color: var(--text);
}
.diff-btn .diff-icon  { font-size: 1.3rem; display: block; margin-bottom: 2px; }
.diff-btn .diff-label { font-size: .72rem; font-weight: 800; color: var(--text2); display: block; }
.diff-btn .diff-multi { font-size: .68rem; font-weight: 900; color: var(--xp); display: block; margin-top: 2px; }
.diff-btn.active.easy  { border-color: var(--xp);    background: rgba(45,184,122,0.08); }
.diff-btn.active.mid   { border-color: var(--orange); background: rgba(251,146,60,0.08); }
.diff-btn.active.mid .diff-multi { color: var(--orange); }
.diff-btn.active.hard  { border-color: var(--primary); background: rgba(233,69,96,0.08); }
.diff-btn.active.hard .diff-multi { color: var(--primary); }
.diff-btn:hover { transform: translateY(-2px); }

/* ============================================================
   テストモードボタン
============================================================ */
.test-mode-btn {
  width: 100%;
  font-family: inherit; font-size: 1rem; font-weight: 900;
  padding: 14px 20px;
  background: var(--blue);
  color: white; border: none; border-radius: var(--radius-md);
  cursor: pointer; box-shadow: 0 4px 16px rgba(79,142,247,.3);
  transition: .2s; text-align: center;
}
.test-mode-btn:hover { opacity: .88; transform: translateY(-2px); }
.test-mode-btn:disabled { opacity: .4; pointer-events: none; }

/* ============================================================
   問題カード
============================================================ */
.question-card {
  background: var(--surface);
  border-radius: var(--radius);
  border: 1.5px solid var(--border2);
  padding: 24px 20px 20px;
  margin-bottom: 12px;
  position: relative; overflow: hidden;
  animation: cardIn .4s cubic-bezier(.34,1.56,.64,1);
}
.question-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--purple), var(--blue));
}
.q-meta { display: flex; gap: 7px; margin-bottom: 14px; align-items: center; }
.q-cat {
  font-size: .68rem; font-weight: 800;
  padding: 3px 9px; border-radius: 20px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  color: var(--text2);
}
.q-lv { font-size: .68rem; font-weight: 800; padding: 3px 9px; border-radius: 20px; }
.lv1 { background: rgba(45,184,122,0.12); color: var(--xp); }
.lv2 { background: rgba(251,146,60,0.12); color: var(--orange); }
.lv3 { background: rgba(233,69,96,0.12); color: var(--primary); }
.q-xp { margin-left: auto; font-size: .75rem; font-weight: 800; color: var(--xp); }
.q-text { font-size: 1.75rem; font-weight: 900; text-align: center; margin-bottom: 16px; line-height: 1.5; white-space: pre-line; color: var(--text); }

/* ヒント */
.hint-btn {
  font-family: inherit; font-size: .78rem; font-weight: 800;
  padding: 6px 14px; border-radius: 20px;
  border: 1.5px solid rgba(159,122,234,0.35);
  background: rgba(159,122,234,0.08); color: var(--purple);
  cursor: pointer; transition: .2s;
}
.hint-btn:hover { background: rgba(159,122,234,0.16); }
.hint-box {
  background: rgba(159,122,234,0.08);
  border: 1px solid rgba(159,122,234,0.25);
  border-radius: var(--radius-sm);
  padding: 9px 12px; font-size: .85rem; color: var(--purple);
  text-align: center; font-weight: 700; margin-top: 8px;
  animation: popIn .25s ease;
}

/* 回答エリア */
.answer-area {
  display: flex; gap: 10px; justify-content: center;
  align-items: center; flex-wrap: wrap; margin-top: 6px;
}
.answer-input {
  font-family: inherit; font-size: 1.7rem; font-weight: 900;
  width: 140px; padding: 10px 14px; text-align: center;
  background: var(--surface2); color: var(--text);
  border: 1.5px solid var(--border2); border-radius: var(--radius-md);
  outline: none; transition: .2s;
}
.answer-input:focus { border-color: var(--primary); background: rgba(233,69,96,0.05); }
.answer-input.correct { border-color: var(--xp); background: rgba(45,184,122,0.06); }
.answer-input.wrong   { border-color: var(--heart); animation: shake .3s ease; }

.submit-btn {
  font-family: inherit; font-size: .95rem; font-weight: 900;
  padding: 12px 20px;
  background: var(--primary); color: white;
  border: none; border-radius: var(--radius-md);
  cursor: pointer; box-shadow: var(--glow-primary); transition: .2s;
}
.submit-btn:hover { opacity: .88; transform: translateY(-1px); }

/* 分数 */
.frac-wrap { display: inline-flex; flex-direction: column; align-items: center; gap: 4px; }
.frac-wrap input {
  font-family: inherit; font-size: 1.2rem; font-weight: 900;
  width: 76px; padding: 7px; text-align: center;
  background: var(--surface2); color: var(--text);
  border: 1.5px solid var(--border2); border-radius: var(--radius-sm); outline: none;
}
.frac-wrap input:focus { border-color: var(--blue); }
.frac-line { width: 76px; height: 2px; background: var(--text); border-radius: 1px; }

/* 選択肢 */
.choices { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; width: 100%; margin-top: 6px; }
.choice-btn {
  font-family: inherit; font-size: .9rem; font-weight: 800;
  padding: 13px 9px;
  background: var(--surface2); color: var(--text);
  border: 1.5px solid var(--border2); border-radius: var(--radius-md);
  cursor: pointer; transition: .2s;
}
.choice-btn:hover { border-color: var(--blue); background: rgba(79,142,247,0.08); transform: translateY(-2px); }
.choice-btn.ok { border-color: var(--xp); background: rgba(45,184,122,0.10); color: var(--xp); }
.choice-btn.ng { border-color: var(--heart); background: rgba(233,69,96,0.10); color: var(--heart); }

/* メモ */
.memo-wrap { margin-top: 12px; }
.memo-toggle {
  font-family: inherit; font-size: .75rem; font-weight: 800;
  padding: 5px 13px; border-radius: 20px;
  border: 1.5px solid rgba(79,142,247,0.3);
  background: rgba(79,142,247,0.06); color: var(--blue);
  cursor: pointer; display: flex; align-items: center; gap: 4px;
  margin: 0 auto; transition: .2s;
}
.memo-toggle:hover { background: rgba(79,142,247,0.12); }
.memo-area { margin-top: 8px; animation: popIn .25s ease; }
.memo-label { font-size: .68rem; color: var(--text2); font-weight: 700; margin-bottom: 5px; text-align: center; }
.memo-textarea {
  width: 100%; min-height: 80px; padding: 10px 12px;
  font-family: 'M PLUS Rounded 1c', sans-serif; font-size: .95rem;
  background: var(--surface2); color: var(--text);
  border: 1.5px solid rgba(79,142,247,0.25); border-radius: var(--radius-md);
  outline: none; resize: vertical; line-height: 1.6;
}
.memo-textarea:focus { border-color: var(--blue); }

/* フィードバック */
.feedback {
  min-height: 50px; border-radius: var(--radius-md);
  padding: 11px 15px; text-align: center;
  font-weight: 800; font-size: .95rem; margin-bottom: 10px;
}
.feedback.ok { background: rgba(45,184,122,0.10); color: var(--xp); border: 1px solid rgba(45,184,122,0.25); animation: popIn .3s ease; }
.feedback.ng { background: rgba(233,69,96,0.10); color: var(--primary); border: 1px solid rgba(233,69,96,0.25); }

/* 次へボタン */
.next-btn {
  font-family: inherit; font-size: 1.05rem; font-weight: 900;
  padding: 15px 36px; border-radius: var(--radius-md); border: none;
  cursor: pointer; display: block; margin: 0 auto;
  background: var(--xp); color: white;
  box-shadow: 0 4px 16px rgba(45,184,122,0.3);
  animation: popIn .3s ease; transition: .2s;
}
.next-btn:hover { opacity: .88; transform: translateY(-2px); }

/* ============================================================
   ゲームオーバー
============================================================ */
.gameover-card {
  background: var(--surface);
  border-radius: var(--radius); padding: 32px 22px;
  text-align: center;
  border: 1.5px solid rgba(233,69,96,0.3);
  animation: popIn .4s ease;
}
.gameover-card h2 { font-size: 1.7rem; font-weight: 900; margin-bottom: 10px; color: var(--heart); }
.gameover-card p  { color: var(--text2); font-weight: 700; margin-bottom: 20px; }
.revive-btn {
  font-family: inherit; font-size: 1rem; font-weight: 900;
  padding: 13px 28px;
  background: var(--primary); color: white;
  border: none; border-radius: var(--radius-md);
  cursor: pointer; margin: 6px; transition: .2s;
}
.revive-btn:hover { opacity: .88; transform: translateY(-2px); }
.revive-btn.ghost {
  background: var(--surface2);
  border: 1.5px solid var(--border2);
  color: var(--text2);
}

/* ============================================================
   バッジ
============================================================ */
.badges-section { margin-top: 18px; }
.badges-title { font-size: .8rem; font-weight: 900; color: var(--text2); margin-bottom: 9px; letter-spacing: .08em; }
.badges-grid { display: flex; gap: 7px; flex-wrap: wrap; }
.badge-item {
  width: 48px; height: 48px; border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.4rem; position: relative; transition: .2s;
}
.badge-item.locked  { filter: grayscale(1); opacity: .2; }
.badge-item.unlocked {
  background: rgba(245,166,35,0.10);
  border: 1.5px solid rgba(245,166,35,0.3);
}
.badge-item.unlocked:hover { transform: scale(1.15); }
.badge-tip {
  position: absolute; bottom: 110%; left: 50%; transform: translateX(-50%);
  background: var(--text); color: white;
  font-size: .65rem; font-weight: 700;
  padding: 3px 7px; border-radius: 7px;
  white-space: nowrap; opacity: 0; pointer-events: none;
  transition: .15s; z-index: 10;
}
.badge-item:hover .badge-tip { opacity: 1; }

/* ============================================================
   モーダル
============================================================ */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.4);
  display: flex; align-items: center; justify-content: center;
  z-index: 999; animation: fadeIn .3s ease;
}
.modal-box {
  background: var(--surface);
  border-radius: var(--radius); padding: 36px 28px;
  text-align: center; max-width: 340px; width: 90%;
  border: 1.5px solid rgba(245,166,35,0.3);
  animation: popIn .4s cubic-bezier(.34,1.56,.64,1);
}
.modal-box h2 { font-size: 1.5rem; font-weight: 900; margin-bottom: 8px; }
.modal-box p  { color: var(--text2); white-space: pre-line; margin-bottom: 8px; font-weight: 700; }
.modal-xp  { font-size: 1.8rem; font-weight: 900; color: var(--xp); margin: 10px 0; }
.modal-close {
  font-family: inherit; font-size: 1rem; font-weight: 900;
  padding: 13px 36px;
  background: var(--gold); color: white;
  border: none; border-radius: var(--radius-md);
  cursor: pointer; margin-top: 14px; transition: .2s;
}
.modal-close:hover { opacity: .88; transform: translateY(-2px); }

/* ============================================================
   テストモード
============================================================ */
.test-header {
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(79,142,247,0.08);
  border: 1.5px solid rgba(79,142,247,0.25);
  border-radius: var(--radius-md); padding: 12px 16px; margin-bottom: 14px;
}
.test-timer {
  font-size: 2rem; font-weight: 900; color: var(--blue);
  min-width: 50px; text-align: center; transition: .3s;
}
.test-timer.danger { color: var(--primary); animation: timerPulse .5s ease infinite; }
.test-progress  { font-size: .9rem; font-weight: 800; color: var(--text2); }
.test-score-big { font-size: 1rem; font-weight: 900; color: var(--xp); }
.test-lv-badge {
  display: inline-block; padding: 3px 10px; border-radius: 20px;
  font-size: .72rem; font-weight: 900;
  background: rgba(79,142,247,0.12); color: var(--blue);
  border: 1px solid rgba(79,142,247,0.3); margin-bottom: 10px;
}
.test-result-card {
  background: var(--surface);
  border-radius: var(--radius); padding: 32px 22px;
  text-align: center;
  border: 1.5px solid rgba(79,142,247,0.3);
  animation: popIn .4s ease;
}
.test-result-card h2   { font-size: 1.6rem; font-weight: 900; margin-bottom: 8px; }
.test-result-score     { font-size: 3.5rem; font-weight: 900; color: var(--blue); display: block; margin: 10px 0; }
.test-result-best      { font-size: .85rem; color: var(--gold); font-weight: 700; margin-bottom: 20px; }
.test-retry-btn {
  font-family: inherit; font-size: 1rem; font-weight: 900;
  padding: 13px 28px;
  background: var(--blue); color: white;
  border: none; border-radius: var(--radius-md);
  cursor: pointer; margin: 5px; transition: .2s;
}
.test-retry-btn:hover { opacity: .88; transform: translateY(-2px); }
.test-retry-btn.ghost { background: var(--surface2); border: 1.5px solid var(--border2); color: var(--text2); }

/* ============================================================
   エフェクト系（変更なし）
============================================================ */
.combo-pop { position: fixed; top: 40%; left: 50%; transform: translate(-50%,-50%); font-size: 3.2rem; font-weight: 900; pointer-events: none; z-index: 9999; animation: comboPop .9s ease forwards; }
.xp-pop { position: fixed; top: 38%; left: 50%; transform: translateX(-50%); pointer-events: none; z-index: 9998; font-size: 1.1rem; font-weight: 900; color: var(--xp); animation: xpFloat .9s ease forwards; }
.save-dot { position: fixed; bottom: 16px; right: 16px; width: 8px; height: 8px; border-radius: 50%; background: var(--xp); opacity: 0; transition: opacity .3s; z-index: 999; }
.save-dot.saving { opacity: 1; animation: pulse 1s infinite; }
.correct-flash { position: fixed; inset: 0; background: rgba(45,184,122,0.16); pointer-events: none; z-index: 9990; animation: flashIn .35s ease forwards; }
.wrong-flash   { position: fixed; inset: 0; background: rgba(233,69,96,0.18); pointer-events: none; z-index: 9990; animation: wrongFlash .4s ease forwards; }
.coin { position: fixed; font-size: 1.5rem; pointer-events: none; z-index: 9995; animation: coinFall var(--dur,1.2s) ease forwards; }
.star-burst { position: fixed; font-size: 1.8rem; pointer-events: none; z-index: 9994; animation: starBurst .8s cubic-bezier(.34,1.56,.64,1) forwards; }
.levelup-overlay { position: fixed; inset: 0; background: rgba(240,244,255,0.92); z-index: 9980; display: flex; align-items: center; justify-content: center; animation: lvFadeIn .4s ease; }
.levelup-content { text-align: center; animation: lvPop .6s cubic-bezier(.34,1.56,.64,1); }
.levelup-content .lv-big { font-size: 6rem; display: block; margin-bottom: 8px; animation: lvSpin 1s ease; }
.levelup-content h2 { font-size: 2.2rem; font-weight: 900; color: var(--gold); margin-bottom: 6px; }
.levelup-content p { color: var(--text2); font-size: 1rem; font-weight: 700; margin-bottom: 20px; }
.levelup-close { font-family: inherit; font-size: 1rem; font-weight: 900; padding: 13px 36px; background: var(--gold); color: white; border: none; border-radius: var(--radius-md); cursor: pointer; }
.heart.hit { animation: heartHit .4s ease; }

/* ============================================================
   アニメーション（変更なし）
============================================================ */
@keyframes pulse      { 0%,100%{transform:scale(1)}50%{transform:scale(1.4)} }
@keyframes cardIn     { from{opacity:0;transform:scale(.92) translateY(12px)}to{opacity:1;transform:none} }

<script type="module">
import { FIREBASE_CONFIG } from './firebase.js';
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, doc, getDoc, setDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const app = initializeApp(FIREBASE_CONFIG);
const db  = getFirestore(app);

const HEARTS_MAX = 5;
const DAILY_GOAL = 10;
function dailyGoal(lv){ return DAILY_GOAL; }
const RANK_NAMES = [
  'はじめての冒険者','計算の見習い','算数の戦士','数式の魔法使い','算術マスター',
  '計算の賢者','数学の魔導士','算数キング','計算の神','伝説の計算王'
];
const MAX_LV = 100;
function xpForLv(lv){ return lv >= MAX_LV ? Infinity : Math.floor(80 + lv * 12 + lv * lv * 0.8); }
function lvName(lv){ return RANK_NAMES[Math.min(Math.floor((lv-1)/10), RANK_NAMES.length-1)]; }
const BADGES = [
  {id:'first',icon:'🌟',name:'はじめての正解'},{id:'streak3',icon:'🔥',name:'3連続正解'},
  {id:'streak7',icon:'💥',name:'7連続正解'},{id:'daily1',icon:'📅',name:'初デイリークリア'},
  {id:'day3',icon:'🗓️',name:'3日連続'},{id:'day7',icon:'🏆',name:'7日連続'},
  {id:'lv3',icon:'⚡',name:'レベル3達成'},{id:'lv5',icon:'💎',name:'レベル5達成'},
  {id:'total50',icon:'💯',name:'累計50問'},{id:'total200',icon:'🚀',name:'累計200問'},
  {id:'fraction1',icon:'🍕',name:'分数5問正解'},{id:'word1',icon:'📖',name:'文章題5問正解'}
];
const TEST_UNLOCK_LV = 5;
const TEST_TIME = 60;
const TEST_Q_COUNT = 10;
const TEST_LEVELS = [
  {lv:1,unlockLv:5, name:'テストLv1',cats:[0],    diff:'easy', desc:'足し算・引き算'},
  {lv:2,unlockLv:8, name:'テストLv2',cats:[0],    diff:'mid',  desc:'掛け算・割り算'},
  {lv:3,unlockLv:12,name:'テストLv3',cats:[0,1,2],diff:'mid',  desc:'分数・小数追加'},
  {lv:4,unlockLv:16,name:'テストLv4',cats:[0,1,2,3],diff:'hard',desc:'全カテゴリ混合'},
  {lv:5,unlockLv:20,name:'テストLv5',cats:[0,1,2,3],diff:'hard',desc:'🔥鬼モード'},
];
function getTestLv(userLv){ let tl=TEST_LEVELS[0]; for(const t of TEST_LEVELS){ if(userLv>=t.unlockLv) tl=t; } return tl; }
const XP_TBL = {lv1:10,lv2:15,lv3:25};
const DIFF_MULTI = {easy:1, mid:1.5, hard:2};
const DIFF_LABELS = {easy:'かんたん', mid:'ふつう', hard:'むずかしい'};
const R=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const gcd=(a,b)=>b===0?a:gcd(b,a%b);
const shuffle=a=>[...a].sort(()=>Math.random()-.5);
const todayStr=()=>{const d=new Date();return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;};

let username='', save={}, category=0, difficulty='easy', question=null, answered=false;
let hintVisible=false, memoVisible=false;
let saveTimer=null;
let testMode=false, testTimer=null, testTimeLeft=0;
let testCorrect=0, testTotal=0, testCurrentQ=null, testAnswered=false;

function persistSave() {
  document.getElementById('save-dot').classList.add('saving');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async ()=>{
    try { await setDoc(doc(db,'users',username), save); } catch(e){ console.error('save error',e); }
    document.getElementById('save-dot').classList.remove('saving');
  }, 800);
}

async function init() {
  username = sessionStorage.getItem('sq_user');
  if (!username) { location.href='index.html'; return; }
  const cached = sessionStorage.getItem('sq_data');
  if (cached) save = JSON.parse(cached);
  try { const snap = await getDoc(doc(db,'users',username)); if (snap.exists()) save = snap.data(); } catch(e){}
  const today = todayStr();
  const yesterday = (()=>{const d=new Date();d.setDate(d.getDate()-1);return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;})();
  if (save.lastLogin !== today) { save.loginDays = save.lastLogin===yesterday ? (save.loginDays||0)+1 : 1; save.streak = save.loginDays; save.lastLogin = today; }
  if (save.dailyDate !== today) { save.dailyDone=0; save.dailyDate=today; save.hearts=HEARTS_MAX; }
  const elapsed = Date.now()-(save.lastHeartRegen||Date.now());
  const regen = Math.floor(elapsed/(30*60*1000));
  if (regen>0) { save.hearts=Math.min(HEARTS_MAX,(save.hearts||0)+regen); save.lastHeartRegen=Date.now(); }
  if (!save.coins) save.coins = 0;
  if (!save.ownedParts) save.ownedParts = ['hair_short','clothes_simple','acc_none','face_happy'];
  if (!save.equipped) save.equipped = { hair:'hair_short', clothes:'clothes_simple', accessory:'acc_none', face:'face_happy' };
  persistSave();
  document.getElementById('app').style.display='block';
  renderUI(); renderBadges();
  if ((save.hearts||0)<=0) renderGameOver(); else nextQuestion();
  renderLessonCorner(category);  // ← この1行を追加
}

function renderUI() {
  document.getElementById('ui-username').textContent='👤 '+username;
  document.getElementById('ui-streak').textContent=save.streak||0;
  document.getElementById('ui-xp').textContent=save.xp||0;
  const hEl=document.getElementById('ui-hearts'); hEl.innerHTML='';
  for(let i=0;i<HEARTS_MAX;i++){const s=document.createElement('span');s.className='heart'+(i>=(save.hearts||0)?' lost':'');s.textContent='❤️';hEl.appendChild(s);}
  const lv=save.level||1, xp=save.xp||0, max=xpForLv(lv);
  document.getElementById('ui-lv-orb').textContent=lv;
  document.getElementById('ui-lv-name').textContent=lvName(lv);
  document.getElementById('ui-xp-next').textContent=max===Infinity?'MAX':`${xp} / ${max} XP`;
  document.getElementById('ui-lv-bar').style.width=max===Infinity?'100%':`${Math.min(100,xp/max*100)}%`;
  const _dg=dailyGoal(save.level||1); const done=Math.min(save.dailyDone||0,_dg), pct=done/_dg;
  document.getElementById('ui-ring').style.strokeDashoffset=138.2*(1-pct);
  document.getElementById('ui-ring-text').textContent=`${done}/${_dg}`;
  document.getElementById('ui-goal-title').textContent=done>=_dg?'🎉 クリア済み':'今日のノルマ';
  document.getElementById('ui-goal-sub').textContent=done>=_dg?'✅ 今日のノルマ達成！':`あと ${_dg-done} 問でノルマ達成！（目標${_dg}問）`;
  const lv2=save.level||1;
  const wrap=document.getElementById('test-mode-wrap');
  if(wrap){ if(lv2>=TEST_UNLOCK_LV){ wrap.style.display='block'; const tl=getTestLv(lv2); const label=document.getElementById('test-lv-label'); if(label) label.textContent=`${tl.name}（${tl.desc}）${save.bestTestScore?'| ベスト: '+save.bestTestScore+'点':''}`; } else { wrap.style.display='none'; } }
}

function renderBadges(){ const g=document.getElementById('badges-grid'); g.innerHTML=''; BADGES.forEach(b=>{ const el=document.createElement('div'); el.className='badge-item '+((save.unlockedBadges||[]).includes(b.id)?'unlocked':'locked'); el.innerHTML=`${b.icon}<div class="badge-tip">${b.name}</div>`; g.appendChild(el); }); }

function genArithmetic(tier){ const op=tier==='easy'?['+','-'][R(0,1)]:tier==='mid'?['+','-','×','÷'][R(0,3)]:['+','-','×','÷'][R(0,3)]; let a,b,ans; if(op==='+'){if(tier==='easy'){a=R(1,20);b=R(1,20);}else if(tier==='mid'){a=R(10,99);b=R(10,99);}else{a=R(100,999);b=R(100,999);}ans=a+b;}else if(op==='-'){if(tier==='easy'){a=R(5,20);b=R(1,a);}else if(tier==='mid'){a=R(20,99);b=R(10,a);}else{a=R(100,999);b=R(10,a);}ans=a-b;}else if(op==='×'){if(tier==='mid'){a=R(2,9);b=R(2,9);}else{a=R(2,99);b=R(2,99);}ans=a*b;}else{if(tier==='mid'){ans=R(2,20);b=R(2,9);}else{ans=R(2,50);b=R(2,20);}a=ans*b;} const lv=(op==='+'||op==='-')?(a>99?'lv2':'lv1'):(a>20?'lv3':'lv2'); return{type:'number',lv,label:`四則(${op})`,text:`${a} ${op} ${b} ＝ ?`,answer:ans.toString(),hint:''}; }
function genFraction(tier){ if(tier==='easy') return genArithmetic('easy'); const t=tier==='mid'?R(0,1):R(0,2); if(t===0){const d1=R(2,6),d2=R(2,6),n1=R(1,d1-1),n2=R(1,d2-1),lcm=d1*d2/gcd(d1,d2),rn=n1*(lcm/d1)+n2*(lcm/d2),g=gcd(rn,lcm);return{type:'fraction',lv:'lv2',label:'分数たし算',text:`${n1}/${d1} ＋ ${n2}/${d2} ＝ ?`,hint:`公倍数は${lcm}`,answer:`${rn/g}/${lcm/g}`,na:rn/g,da:lcm/g};} if(t===1){const d1=R(2,6),d2=R(2,6),lcm=d1*d2/gcd(d1,d2);let n1r=R(1,d1-1)*(lcm/d1),n2r=R(1,d2-1)*(lcm/d2);if(n1r<n2r)[n1r,n2r]=[n2r,n1r];const rn=n1r-n2r,g=gcd(rn||1,lcm);return{type:'fraction',lv:'lv2',label:'分数ひき算',text:`${n1r/(lcm/d1)}/${d1} ー ${n2r/(lcm/d2)||1}/${d2} ＝ ?`,hint:`公倍数は${lcm}`,answer:`${rn/g}/${lcm/g}`,na:rn/g,da:lcm/g};} const n1=R(1,5),d1=R(2,7),n2=R(1,5),d2=R(2,7),rn=n1*n2,rd=d1*d2,g=gcd(rn,rd); return{type:'fraction',lv:'lv3',label:'分数かけ算',text:`${n1}/${d1} × ${n2}/${d2} ＝ ?`,hint:'分子同士・分母同士をかけよう',answer:`${rn/g}/${rd/g}`,na:rn/g,da:rd/g}; }
function genDecimal(tier){ if(tier==='easy') return genArithmetic('easy'); const t=tier==='mid'?R(0,1):R(0,2); if(t===0){const a=(R(10,99)/10).toFixed(1),b=(R(10,99)/10).toFixed(1),ans=((parseFloat(a)*10+parseFloat(b)*10)/10).toFixed(1);return{type:'number',lv:'lv2',label:'小数たし算',text:`${a} ＋ ${b} ＝ ?`,answer:ans,hint:''};} if(t===1){let a=(R(10,99)/10).toFixed(1),b=(R(10,99)/10).toFixed(1);if(parseFloat(a)<parseFloat(b))[a,b]=[b,a];const ans=((parseFloat(a)*10-parseFloat(b)*10)/10).toFixed(1);return{type:'number',lv:'lv2',label:'小数ひき算',text:`${a} ー ${b} ＝ ?`,answer:ans,hint:''};} const a=(R(2,9)/10).toFixed(1),b=R(2,9),ans=(parseFloat(a)*b).toFixed(1); return{type:'number',lv:'lv3',label:'小数かけ算',text:`${a} × ${b} ＝ ?`,answer:ans,hint:''}; }
function genWord(tier){ if(tier==='easy') return genArithmetic('easy'); const round4=(n)=>Math.round(n*10000)/10000; const midTs=[()=>{const p=R(100,500),d=R(1,3)*10,s=Math.round(p*(100-d)/100);return{type:'choice',lv:'lv2',label:'文章(割引)',text:`${p}円の商品が${d}%引き。\nいくらになる？`,hint:`${p}×(1-${d}/100)`,answer:s.toString(),choices:shuffle([s,p-d,Math.round(p*d/100),s+R(10,50)]).map(String)};},()=>{const tot=R(500,1500),r=R(2,4),a=Math.round(tot*r/(r+1));return{type:'choice',lv:'lv2',label:'文章(割合)',text:`${tot}円を ${r}:1 で分けます。\n多い方は何円？`,hint:'全体÷(比の合計)×比',answer:a.toString(),choices:shuffle([a,a+R(20,100),tot-a,Math.round(tot/r)]).map(String)};}]; const hardTs=[()=>{const t=R(1,6)*10,s=R(3,12)*10,d=Math.round(s*t/60*10)/10;return{type:'choice',lv:'lv3',label:'文章(速さ)',text:`時速${s}kmの電車が${t}分走りました。\n何km進みましたか？`,hint:'速さ×時間÷60',answer:d.toString(),choices:shuffle([d,d+R(1,5),Math.round(s*t*10)/10,Math.max(1,d-R(1,5))]).map(String)};},()=>{const r=R(3,8),area=round4(r*r*3.14),ans=area.toString();return{type:'choice',lv:'lv3',label:'文章(面積)',text:`半径${r}cmの円の面積は？\n（円周率3.14）`,hint:'半径×半径×3.14',answer:ans,choices:shuffle([area,round4(r*2*3.14),r*r,round4((r+1)*(r+1)*3.14)]).map(String)};}]; const pool=tier==='hard'?[...midTs,...hardTs]:midTs; return pool[R(0,pool.length-1)](); }
function gen(){ let tier=difficulty; if((category===1||category===2||category===3)&&tier==='easy') tier='mid'; switch(category){case 0:return genArithmetic(tier);case 1:return genFraction(tier);case 2:return genDecimal(tier);case 3:return genWord(tier);} }

window.setCategory = function(idx) {
  category = idx;
  document.querySelectorAll('.cat-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
  renderLessonCorner(idx);  // ← この1行を追加
  nextQuestion();
};

let _actx=null;
function getACtx(){ if(!_actx) _actx=new(window.AudioContext||window.webkitAudioContext)(); return _actx; }
function playNote(freq,duration,vol,delay=0){ try{const ctx=getACtx();const now=ctx.currentTime+delay;const osc=ctx.createOscillator();const g=ctx.createGain();osc.type='sine';osc.frequency.value=freq;g.gain.setValueAtTime(0,now);g.gain.linearRampToValueAtTime(vol,now+0.01);g.gain.exponentialRampToValueAtTime(0.001,now+duration);osc.connect(g);g.connect(ctx.destination);osc.start(now);osc.stop(now+duration+0.05);}catch(e){} }
function soundCorrect(){ try{const ctx=getACtx();const now=ctx.currentTime;const bufLen=Math.floor(ctx.sampleRate*0.06);const noiseBuf=ctx.createBuffer(1,bufLen,ctx.sampleRate);const nd=noiseBuf.getChannelData(0);for(let i=0;i<bufLen;i++) nd[i]=(Math.random()*2-1)*(1-i/bufLen);const src=ctx.createBufferSource();src.buffer=noiseBuf;const bp=ctx.createBiquadFilter();bp.type='bandpass';bp.frequency.value=1400;bp.Q.value=1.2;const ng=ctx.createGain();ng.gain.value=0.12;src.connect(bp);bp.connect(ng);ng.connect(ctx.destination);src.start(now);src.stop(now+0.07);playNote(660,0.5,0.07,0.03);playNote(880,0.7,0.04,0.12);}catch(e){} }
function soundCombo(){ [0,0.1].forEach(d=>{try{const ctx=getACtx();const now=ctx.currentTime+d;const bufLen=Math.floor(ctx.sampleRate*0.05);const buf=ctx.createBuffer(1,bufLen,ctx.sampleRate);const data=buf.getChannelData(0);for(let i=0;i<bufLen;i++) data[i]=(Math.random()*2-1)*(1-i/bufLen);const src=ctx.createBufferSource();src.buffer=buf;const bp=ctx.createBiquadFilter();bp.type='bandpass';bp.frequency.value=1200;bp.Q.value=1.0;const g=ctx.createGain();g.gain.value=0.1;src.connect(bp);bp.connect(g);g.connect(ctx.destination);src.start(now);src.stop(now+0.06);}catch(e){}});playNote(523,0.8,0.06,0.25);playNote(659,0.8,0.05,0.38);playNote(784,1.0,0.05,0.51); }
function soundWrong(){ try{const ctx=getACtx();const now=ctx.currentTime;const osc=ctx.createOscillator();osc.type='sine';osc.frequency.setValueAtTime(200,now);osc.frequency.exponentialRampToValueAtTime(130,now+0.28);const g=ctx.createGain();g.gain.setValueAtTime(0.09,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.32);const lp=ctx.createBiquadFilter();lp.type='lowpass';lp.frequency.value=500;osc.connect(lp);lp.connect(g);g.connect(ctx.destination);osc.start(now);osc.stop(now+0.35);}catch(e){} }

  if (filtered.length === 0) {
    corner.classList.remove('visible');
    return;
  }

  list.innerHTML = filtered.map(l => `
    <a class="lesson-btn" href="${l.url}">
      <span class="lesson-icon">${l.icon}</span>
      <span class="lesson-info">
        <span class="lesson-name">${l.name}</span>
        <span class="lesson-desc">${l.desc}</span>
      </span>
      <span class="lesson-arrow">→</span>
    </a>
  `).join('');

  corner.classList.add('visible');
}
</script>
</body>
</html>
