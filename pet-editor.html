<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アバター位置エディター｜さんすうクエスト</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f0ff;
  --surface: #ffffff;
  --pink: #e9649d;
  --pink2: #f4a0c8;
  --purple: #b07ae8;
  --blue: #4f8ef7;
  --mint: #2db87a;
  --gold: #f5a623;
  --text: #2d1a3e;
  --text2: #7a5a8a;
  --text3: #b89ac8;
  --border2: rgba(233,100,157,0.25);
  --radius: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Nunito','M PLUS Rounded 1c', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}
header {
  background: white;
  border-bottom: 2px solid var(--border2);
  padding: 12px 20px;
  display: flex; align-items: center; gap: 16px;
  position: sticky; top: 0; z-index: 100;
}
header h1 { font-size: 16px; font-weight: 900; color: var(--purple); }
header .spacer { flex: 1; }
.hbtn {
  font-family: inherit; font-size: 12px; font-weight: 800;
  padding: 6px 16px; border-radius: 20px; border: 2px solid var(--border2);
  background: white; color: var(--text2); cursor: pointer; transition: .15s;
}
.hbtn:hover { background: #fce4f0; }
.hbtn.primary { background: var(--pink); color: white; border-color: var(--pink); }
.hbtn.primary:hover { opacity: .85; }
.hbtn.export { background: var(--mint); color: white; border-color: var(--mint); }

.main {
  display: grid;
  grid-template-columns: 260px 1fr 280px;
  height: calc(100vh - 52px);
}

.panel-left {
  background: white;
  border-right: 2px solid var(--border2);
  overflow-y: auto;
  padding: 12px;
}
.panel-left h3 {
  font-size: 13px; font-weight: 900; color: var(--text2);
  margin-bottom: 8px;
}
.cat-section { margin-bottom: 16px; }
.cat-label {
  font-size: 11px; font-weight: 900; color: var(--purple);
  text-transform: uppercase; letter-spacing: .05em;
  margin-bottom: 6px; padding: 4px 0;
  border-bottom: 1px solid rgba(176,122,232,0.2);
}
.part-list { display: flex; flex-wrap: wrap; gap: 6px; }
.part-thumb {
  width: 70px; height: 70px;
  border: 2px solid var(--border2);
  border-radius: 10px;
  background: #fef8fc;
  cursor: grab;
  overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  transition: .15s;
  position: relative;
}
.part-thumb:hover { border-color: var(--pink); transform: scale(1.05); }
.part-thumb.on-stage { border-color: var(--mint); background: rgba(45,184,122,0.08); }
.part-thumb img { max-width: 90%; max-height: 90%; object-fit: contain; pointer-events: none; }
.part-thumb .pname {
  position: absolute; bottom: 1px; left: 0; right: 0;
  font-size: 8px; font-weight: 800; color: var(--text2);
  text-align: center; background: rgba(255,255,255,0.85);
  padding: 1px 0;
}

.panel-center {
  display: flex; align-items: center; justify-content: center;
  background: repeating-conic-gradient(#e8e8e8 0% 25%, #f5f5f5 0% 50%) 50%/20px 20px;
  overflow: hidden;
  position: relative;
}
.stage-wrap {
  position: relative;
  border: 2px dashed var(--border2);
  border-radius: 8px;
  background: rgba(255,255,255,0.7);
}
.stage-wrap img.base-img {
  display: block;
  user-select: none; -webkit-user-drag: none;
}
.draggable-part {
  position: absolute;
  cursor: move;
  outline: 2px solid transparent;
  transition: outline-color .15s;
}
.draggable-part.selected {
  outline: 2px solid var(--pink);
  outline-offset: 2px;
}
.draggable-part img {
  width: 100%; height: 100%;
  object-fit: contain;
  pointer-events: none;
  user-select: none; -webkit-user-drag: none;
}

.panel-right {
  background: white;
  border-left: 2px solid var(--border2);
  overflow-y: auto;
  padding: 16px;
}
.panel-right h3 {
  font-size: 13px; font-weight: 900; color: var(--text2);
  margin-bottom: 12px;
}
.prop-group { margin-bottom: 16px; }
.prop-label {
  font-size: 11px; font-weight: 800; color: var(--purple);
  margin-bottom: 4px;
}
.prop-row {
  display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
}
.prop-row label { font-size: 12px; font-weight: 700; color: var(--text2); min-width: 20px; }
.prop-row input[type=range] { flex: 1; }
.prop-row .val { font-size: 12px; font-weight: 800; color: var(--text); min-width: 40px; text-align: right; }
.prop-row input[type=number] {
  width: 70px; font-family: inherit; font-size: 12px; font-weight: 700;
  border: 1.5px solid var(--border2); border-radius: 8px; padding: 4px 8px;
  text-align: center;
}
.layer-list { list-style: none; }
.layer-item {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 10px; border-radius: 8px;
  font-size: 12px; font-weight: 700; color: var(--text2);
  cursor: pointer; transition: .12s;
}
.layer-item:hover { background: #fef4f9; }
.layer-item.selected { background: rgba(233,100,157,0.1); color: var(--pink); font-weight: 900; }
.layer-btns { display: flex; gap: 4px; margin-left: auto; }
.layer-btns button {
  font-size: 14px; background: none; border: none; cursor: pointer;
  padding: 2px 4px; border-radius: 4px;
}
.layer-btns button:hover { background: #fce4f0; }

.no-select { font-size: 13px; color: var(--text3); text-align: center; padding: 20px; }

.json-box {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.4);
  display: flex; align-items: center; justify-content: center;
  z-index: 200; display: none;
}
.json-box.show { display: flex; }
.json-inner {
  background: white; border-radius: var(--radius);
  padding: 24px; width: 90%; max-width: 600px; max-height: 80vh;
  overflow: auto;
}
.json-inner h3 { margin-bottom: 12px; }
.json-inner textarea {
  width: 100%; height: 300px; font-family: monospace; font-size: 12px;
  border: 1.5px solid var(--border2); border-radius: 8px; padding: 12px;
  resize: vertical;
}
.json-inner .btns { display: flex; gap: 8px; margin-top: 12px; }

.hint {
  position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
  background: rgba(45,26,62,0.85); color: white;
  font-size: 12px; font-weight: 700; padding: 6px 16px;
  border-radius: 20px; pointer-events: none;
  white-space: nowrap;
}
</style>
</head>
<body>

<header>
  <h1>🎨 アバター位置エディター</h1>
  <span class="spacer"></span>
  <label style="font-size:12px;font-weight:700;color:var(--text2);">
    ステージ倍率:
    <select id="stage-zoom" style="font-family:inherit;font-size:12px;border-radius:8px;padding:2px 6px;">
      <option value="0.4">0.4x</option>
      <option value="0.5" selected>0.5x</option>
      <option value="0.6">0.6x</option>
      <option value="0.8">0.8x</option>
      <option value="1.0">1.0x</option>
    </select>
  </label>
  <button class="hbtn" onclick="resetAll()">🗑 リセット</button>
  <button class="hbtn export" onclick="exportJSON()">📋 JSON出力</button>
</header>

<div class="main">
  <div class="panel-left">
    <h3>📦 パーツ一覧</h3>
    <div id="parts-panel"></div>
  </div>

  <div class="panel-center" id="stage-area">
    <div class="stage-wrap" id="stage-wrap">
      <img class="base-img" id="base-img" src="./base.png" draggable="false">
    </div>
    <div class="hint">クリックで選択 → ドラッグ or 矢印キーで移動 / Delete で削除</div>
  </div>

  <div class="panel-right">
    <h3>⚙️ プロパティ</h3>
    <div id="props-content">
      <div class="no-select">パーツを選択してね</div>
    </div>
    <hr style="border:none;border-top:1px solid rgba(176,122,232,0.2);margin:16px 0;">
    <h3>📚 レイヤー順</h3>
    <ul class="layer-list" id="layer-list"></ul>
  </div>
</div>

<div class="json-box" id="json-modal">
  <div class="json-inner">
    <h3>📋 パーツ位置データ (JSON)</h3>
    <textarea id="json-output" readonly></textarea>
    <div class="btns">
      <button class="hbtn primary" onclick="copyJSON()">コピー</button>
      <button class="hbtn" onclick="document.getElementById('json-modal').classList.remove('show')">とじる</button>
    </div>
  </div>
</div>

<script>
const PART_DEFS = {
  headband: {
    label: '🎀 カチューシャ・帽子',
    items: [
      { id: 'headband_pink', name: 'ピンク猫耳', file: 'parts/01_pink_headband.png' },
      { id: 'headband_yellow', name: '黄猫耳', file: 'parts/03_yellow_headband.png' },
      { id: 'headband_purple', name: '紫ビーニー', file: 'parts/04_purple_beanie.png' },
      { id: 'headband_black', name: '黒猫耳', file: 'parts/05_black_headband.png' },
      { id: 'headband_denim', name: '青猫耳', file: 'parts/06_denim_headband.png' },
      { id: 'headband_cream', name: 'クリーム帽子', file: 'parts/07_cream_hat.png' },
      { id: 'headband_red', name: '赤猫耳', file: 'parts/08_red_headband.png' },
      { id: 'bow_sailor', name: 'セーラーリボン', file: 'parts/02_sailor_bow.png' },
    ]
  },
  tops: {
    label: '👚 トップス・ワンピ',
    items: [
      { id: 'dress_pink', name: 'ピンクドレス', file: 'parts/01_pink_dress.png' },
      { id: 'uniform_sailor', name: 'セーラー服', file: 'parts/02_sailor_uniform.png' },
      { id: 'dress_yellow', name: '黄ワンピ', file: 'parts/03_yellow_dress.png' },
      { id: 'outfit_purple', name: '紫パーカー', file: 'parts/04_purple_outfit.png' },
      { id: 'outfit_black', name: '黒ジャケット', file: 'parts/05_black_outfit.png' },
      { id: 'outfit_denim', name: 'デニム全身', file: 'parts/06_denim_outfit.png' },
      { id: 'outfit_cream', name: 'ニットコーデ', file: 'parts/07_cream_outfit.png' },
      { id: 'outfit_red', name: 'レッドパンク', file: 'parts/08_red_outfit.png' },
    ]
  },
  socks_shoes: {
    label: '👟 靴下・くつ',
    items: [
      { id: 'shoes_pink', name: 'ピンク靴下', file: 'parts/01_pink_socks_shoes.png' },
      { id: 'shoes_sailor', name: 'セーラー靴下', file: 'parts/02_sailor_socks_shoes.png' },
      { id: 'shoes_yellow', name: '黄靴下', file: 'parts/03_yellow_socks_shoes.png' },
      { id: 'shoes_purple', name: '紫スニーカー', file: 'parts/04_purple_socks_shoes.png' },
      { id: 'boots_black', name: '黒ブーツ', file: 'parts/05_black_boots.png' },
      { id: 'boots_cream', name: 'クリームブーツ', file: 'parts/07_cream_boots.png' },
      { id: 'boots_red', name: '赤ブーツ', file: 'parts/08_red_boots.png' },
    ]
  },
  accessory: {
    label: '✨ アクセサリー',
    items: [
      { id: 'chain_red', name: 'チェーン', file: 'parts/08_red_chain.png' },
    ]
  },
  set1: {
    label: '🌈 セット1（前回）',
    items: [
      { id: 'ribbon_blue', name: '青リボン', file: 'parts/ribbon_blue.png' },
      { id: 'ribbon_yellow', name: '黄リボン', file: 'parts/ribbon_yellow.png' },
      { id: 'earring_blue', name: '青イヤリング', file: 'parts/earring_blue.png' },
      { id: 'earring_yellow', name: '黄イヤリング', file: 'parts/earring_yellow.png' },
      { id: 'tops_blue', name: '青トップス', file: 'parts/tops_blue.png' },
      { id: 'tops_yellow', name: '黄トップス', file: 'parts/tops_yellow.png' },
      { id: 'skirt_blue', name: '青スカート', file: 'parts/skirt_blue.png' },
      { id: 'skirt_yellow', name: '黄スカート', file: 'parts/skirt_yellow.png' },
      { id: 'socks_blue', name: '青靴下', file: 'parts/socks_blue.png' },
      { id: 'socks_yellow', name: '黄靴下', file: 'parts/socks_yellow.png' },
      { id: 'bag_blue', name: '青バッグ', file: 'parts/bag_blue.png' },
      { id: 'bag_yellow', name: '黄バッグ', file: 'parts/bag_yellow.png' },
    ]
  },
};

let placedParts = [];
let selectedPart = null;
let nextZ = 10;
let stageZoom = 0.5;
let baseNatW = 0, baseNatH = 0;
let isDragging = false, dragOffX = 0, dragOffY = 0;

const stageWrap = document.getElementById('stage-wrap');
const baseImg = document.getElementById('base-img');

baseImg.onload = function() {
  baseNatW = baseImg.naturalWidth;
  baseNatH = baseImg.naturalHeight;
  applyZoom();
};
if (baseImg.complete && baseImg.naturalWidth) {
  baseNatW = baseImg.naturalWidth;
  baseNatH = baseImg.naturalHeight;
  applyZoom();
}

function applyZoom() {
  const w = Math.round(baseNatW * stageZoom);
  const h = Math.round(baseNatH * stageZoom);
  stageWrap.style.width = w + 'px';
  stageWrap.style.height = h + 'px';
  baseImg.style.width = w + 'px';
  baseImg.style.height = h + 'px';
  placedParts.forEach(p => applyPartTransform(p));
}

document.getElementById('stage-zoom').onchange = function() {
  stageZoom = parseFloat(this.value);
  applyZoom();
};

function renderPartsList() {
  const panel = document.getElementById('parts-panel');
  panel.innerHTML = '';
  for (const [catKey, cat] of Object.entries(PART_DEFS)) {
    const section = document.createElement('div');
    section.className = 'cat-section';
    section.innerHTML = `<div class="cat-label">${cat.label}</div>`;
    const list = document.createElement('div');
    list.className = 'part-list';
    cat.items.forEach(item => {
      const thumb = document.createElement('div');
      thumb.className = 'part-thumb';
      thumb.id = 'thumb-' + item.id;
      thumb.innerHTML = `<img src="${item.file}" alt="${item.name}"><div class="pname">${item.name}</div>`;
      thumb.title = item.name + '\nクリックでステージに追加';
      thumb.onclick = () => addPartToStage(item);
      list.appendChild(thumb);
    });
    section.appendChild(list);
    panel.appendChild(section);
  }
}

function addPartToStage(itemDef) {
  const existing = placedParts.find(p => p.defId === itemDef.id);
  if (existing) { selectPart(existing); return; }
  const el = document.createElement('div');
  el.className = 'draggable-part';
  const img = document.createElement('img');
  img.src = itemDef.file;
  img.draggable = false;
  el.appendChild(img);
  stageWrap.appendChild(el);
  const part = {
    id: 'p_' + Date.now(),
    defId: itemDef.id,
    name: itemDef.name,
    file: itemDef.file,
    x: Math.round(baseNatW * 0.3),
    y: Math.round(baseNatH * 0.2),
    scale: 1.0,
    zIndex: nextZ++,
    el: el,
  };
  placedParts.push(part);
  applyPartTransform(part);
  selectPart(part);
  updateLayerList();
  markThumbs();
  el.onmousedown = (e) => startDrag(e, part);
  el.ontouchstart = (e) => startDrag(e, part);
  el.onclick = (e) => { e.stopPropagation(); selectPart(part); };
}

function applyPartTransform(p) {
  const el = p.el;
  const sx = p.x * stageZoom;
  const sy = p.y * stageZoom;
  el.style.left = sx + 'px';
  el.style.top = sy + 'px';
  el.style.zIndex = p.zIndex;
  const img = el.querySelector('img');
  if (img.naturalWidth) {
    el.style.width = Math.round(img.naturalWidth * stageZoom * p.scale) + 'px';
    el.style.height = Math.round(img.naturalHeight * stageZoom * p.scale) + 'px';
  } else {
    img.onload = () => {
      el.style.width = Math.round(img.naturalWidth * stageZoom * p.scale) + 'px';
      el.style.height = Math.round(img.naturalHeight * stageZoom * p.scale) + 'px';
    };
  }
}

function selectPart(p) {
  placedParts.forEach(pp => pp.el.classList.remove('selected'));
  selectedPart = p;
  if (p) p.el.classList.add('selected');
  renderProps();
  updateLayerList();
}

document.getElementById('stage-area').addEventListener('click', (e) => {
  if (e.target.id === 'stage-area' || e.target.id === 'stage-wrap' || e.target.id === 'base-img') {
    selectPart(null);
  }
});

function startDrag(e, part) {
  e.preventDefault();
  selectPart(part);
  isDragging = true;
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  const rect = part.el.getBoundingClientRect();
  dragOffX = clientX - rect.left;
  dragOffY = clientY - rect.top;
  const onMove = (ev) => {
    if (!isDragging) return;
    const cx = ev.touches ? ev.touches[0].clientX : ev.clientX;
    const cy = ev.touches ? ev.touches[0].clientY : ev.clientY;
    const stageRect = stageWrap.getBoundingClientRect();
    const newLeft = cx - stageRect.left - dragOffX;
    const newTop = cy - stageRect.top - dragOffY;
    part.x = Math.round(newLeft / stageZoom);
    part.y = Math.round(newTop / stageZoom);
    applyPartTransform(part);
    renderProps();
  };
  const onUp = () => {
    isDragging = false;
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    document.removeEventListener('touchmove', onMove);
    document.removeEventListener('touchend', onUp);
  };
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
  document.addEventListener('touchmove', onMove, { passive: false });
  document.addEventListener('touchend', onUp);
}

document.addEventListener('keydown', (e) => {
  if (!selectedPart) return;
  const step = e.shiftKey ? 10 : 1;
  switch (e.key) {
    case 'ArrowLeft':  selectedPart.x -= step; break;
    case 'ArrowRight': selectedPart.x += step; break;
    case 'ArrowUp':    selectedPart.y -= step; break;
    case 'ArrowDown':  selectedPart.y += step; break;
    case 'Delete':
    case 'Backspace':
      if (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA') return;
      removePart(selectedPart);
      return;
    default: return;
  }
  e.preventDefault();
  applyPartTransform(selectedPart);
  renderProps();
});

function removePart(p) {
  p.el.remove();
  placedParts = placedParts.filter(pp => pp !== p);
  if (selectedPart === p) selectedPart = null;
  renderProps();
  updateLayerList();
  markThumbs();
}

function renderProps() {
  const container = document.getElementById('props-content');
  if (!selectedPart) {
    container.innerHTML = '<div class="no-select">パーツを選択してね</div>';
    return;
  }
  const p = selectedPart;
  container.innerHTML = `
    <div class="prop-group">
      <div class="prop-label">📍 ${p.name}</div>
      <div class="prop-row">
        <label>X</label>
        <input type="number" id="prop-x" value="${p.x}" onchange="setProp('x', this.value)">
        <label>Y</label>
        <input type="number" id="prop-y" value="${p.y}" onchange="setProp('y', this.value)">
      </div>
    </div>
    <div class="prop-group">
      <div class="prop-label">🔍 スケール</div>
      <div class="prop-row">
        <input type="range" min="0.1" max="3" step="0.05" value="${p.scale}"
          oninput="setProp('scale', this.value); this.nextElementSibling.textContent=parseFloat(this.value).toFixed(2)">
        <span class="val">${p.scale.toFixed(2)}</span>
      </div>
    </div>
    <div class="prop-group">
      <div class="prop-label">📚 Zオーダー</div>
      <div class="prop-row">
        <input type="number" id="prop-z" value="${p.zIndex}" min="0" max="100"
          onchange="setProp('zIndex', this.value)">
        <button class="hbtn" onclick="setProp('zIndex', ${p.zIndex + 1})" title="前面へ">⬆️</button>
        <button class="hbtn" onclick="setProp('zIndex', Math.max(0, ${p.zIndex - 1}))" title="背面へ">⬇️</button>
      </div>
    </div>
    <div style="margin-top:12px;">
      <button class="hbtn" style="color:#e55;border-color:#e55;" onclick="removePart(selectedPart)">🗑 このパーツを削除</button>
    </div>
  `;
}

window.setProp = function(key, val) {
  if (!selectedPart) return;
  if (key === 'scale') {
    selectedPart[key] = parseFloat(val);
  } else {
    selectedPart[key] = parseInt(val) || 0;
  }
  applyPartTransform(selectedPart);
  if (key !== 'x' && key !== 'y') renderProps();
};

function updateLayerList() {
  const list = document.getElementById('layer-list');
  const sorted = [...placedParts].sort((a, b) => b.zIndex - a.zIndex);
  list.innerHTML = '';
  sorted.forEach(p => {
    const li = document.createElement('li');
    li.className = 'layer-item' + (selectedPart === p ? ' selected' : '');
    li.innerHTML = `
      <span>${p.name}</span>
      <span style="font-size:10px;color:var(--text3)">z:${p.zIndex}</span>
      <div class="layer-btns">
        <button onclick="event.stopPropagation(); moveZ(${placedParts.indexOf(p)}, 1)" title="前面へ">⬆</button>
        <button onclick="event.stopPropagation(); moveZ(${placedParts.indexOf(p)}, -1)" title="背面へ">⬇</button>
      </div>
    `;
    li.onclick = () => selectPart(p);
    list.appendChild(li);
  });
}

window.moveZ = function(idx, dir) {
  const p = placedParts[idx];
  if (!p) return;
  p.zIndex = Math.max(0, p.zIndex + dir);
  applyPartTransform(p);
  selectPart(p);
};

function markThumbs() {
  document.querySelectorAll('.part-thumb').forEach(t => t.classList.remove('on-stage'));
  placedParts.forEach(p => {
    const t = document.getElementById('thumb-' + p.defId);
    if (t) t.classList.add('on-stage');
  });
}

window.resetAll = function() {
  if (!confirm('すべてのパーツをステージからクリアしますか？')) return;
  placedParts.forEach(p => p.el.remove());
  placedParts = [];
  selectedPart = null;
  nextZ = 10;
  renderProps();
  updateLayerList();
  markThumbs();
};

window.exportJSON = function() {
  const data = placedParts.map(p => ({
    id: p.defId,
    name: p.name,
    file: p.file,
    x: p.x,
    y: p.y,
    scale: p.scale,
    zIndex: p.zIndex,
  }));
  const partsConfig = {};
  data.forEach(d => {
    partsConfig[d.id] = {
      file: d.file,
      x: d.x,
      y: d.y,
      scale: d.scale,
      zIndex: d.zIndex,
    };
  });
  const output = {
    _comment: 'pet-editor.html で生成した位置データ',
    baseImage: 'base.png',
    baseSize: { w: baseNatW, h: baseNatH },
    stageZoom: stageZoom,
    parts: data,
    partsConfig: partsConfig,
  };
  document.getElementById('json-output').value = JSON.stringify(output, null, 2);
  document.getElementById('json-modal').classList.add('show');
};

window.copyJSON = function() {
  const ta = document.getElementById('json-output');
  ta.select();
  document.execCommand('copy');
  alert('コピーしました！');
};

renderPartsList();
</script>
</body>
</html>
